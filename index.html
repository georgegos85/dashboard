<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Comercial ISP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; } 
        .recharts-cartesian-grid-horizontal line { stroke: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .modal-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .modal-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background-color: #ffffff !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .no-export { display: none !important; }
            .shadow-md, .shadow-lg, .shadow-sm, .shadow-xl, .shadow-2xl { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
            .custom-scroll, .modal-scroll, .overflow-y-auto { overflow: visible !important; max-height: none !important; }
            .recharts-wrapper { page-break-inside: avoid !important; }
            div[class*="bg-white"] { page-break-inside: avoid !important; }
            .print-modal-bg { position: static !important; background: transparent !important; backdrop-filter: none !important; padding: 0 !important; }
            .print-modal-wrapper { max-height: none !important; box-shadow: none !important; border: none !important; border-radius: 0 !important; width: 100% !important; max-width: none !important; margin: 0 !important; }
        }

        .pdf-mode .no-export { display: none !important; }
        .pdf-mode .shadow-md, .pdf-mode .shadow-lg, .pdf-mode .shadow-sm, .pdf-mode .shadow-xl, .pdf-mode .shadow-2xl { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
        .pdf-mode ::-webkit-scrollbar { display: none !important; }
        .pdf-mode * { scrollbar-width: none !important; }
        .pdf-mode .recharts-wrapper { page-break-inside: avoid !important; }
        .pdf-mode div[class*="bg-white"] { page-break-inside: avoid !important; }
        .pdf-mode.has-modal > div:first-child { display: none !important; }
        .pdf-mode .modal-overlay-bg { position: relative !important; background: transparent !important; backdrop-filter: none !important; padding: 0 !important; min-height: 100vh !important; align-items: flex-start !important; }
        .pdf-mode .print-modal-wrapper { max-height: none !important; box-shadow: none !important; border: none !important; border-radius: 0 !important; width: 100% !important; max-width: none !important; margin: 0 !important; overflow: hidden !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar, Cell, Treemap, Legend, ReferenceLine, ScatterChart, Scatter, ZAxis, ComposedChart } = window.Recharts;

        const USUARIOS = [
            { nome: "George Silva (Admin)", estados: "ALL", role: "admin", hash: "Z3NpbHZhMDAx" },
            { nome: "Diretoria", estados: "ALL", role: "admin", hash: "YWRtaW4uZGly" },
            { nome: "George Silva (Regional)", estados: ["AL", "BA", "PE", "SE"], role: "ev", hash: "Z2VvcmdlLnNpbHZh" },
            { nome: "Luiz Hamilton", estados: ["AC", "AP", "AM", "MA", "PA", "RO", "RR"], role: "ev", hash: "bHVpei5oYW1pbHRvbg==" },
            { nome: "Carine Pellegrino", estados: ["CE", "PB", "PI", "RN"], role: "ev", hash: "Y2FyaW5lLnBlbGxlZ3Jpbm8=" },
            { nome: "Diego Garcia", estados: ["DF", "GO", "TO"], role: "ev", hash: "ZGllZ28uZ2FyY2lh" },
            { nome: "Aldemir Neto", estados: ["ES", "RJ"], role: "ev", hash: "YWxkZW1pci5uZXRv" },
            { nome: "Caique Musto", estados: ["MG"], role: "ev", hash: "Y2FpcXVlLm11c3Rv" },
            { nome: "Diego Ceirutti", estados: ["PR", "SC"], role: "ev", hash: "ZGllZ28uY2VpcnV0dGk=" },
            { nome: "Fiad Neto", estados: ["RS", "SC"], role: "ev", hash: "ZmlhZC5uZXRv" },
            { nome: "Juliana Passo", estados: ["SP"], role: "ev", hash: "anVsaWFuYS5wYXNzbw==" }
        ];

        const SVG_PATHS = {
            TrendingUp: `<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>`,
            TrendingDown: `<polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/>`,
            Search: `<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`,
            ChevronDown: `<polyline points="6 9 12 15 18 9"/>`,
            MapPin: `<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>`,
            Truck: `<rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle>`,
            Users: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`,
            X: `<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,
            Clock: `<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>`,
            Package: `<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>`,
            List: `<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>`,
            AlertCircle: `<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>`,
            Loader2: `<path d="M21 12a9 9 0 1 1-6.219-8.56"/>`,
            Upload: `<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>`,
            Target: `<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>`,
            Download: `<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>`,
            FileSpreadsheet: `<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M8 13h2"></path><path d="M8 17h2"></path><path d="M14 13h2"></path><path d="M14 17h2"></path>`,
            BookOpen: `<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>`,
            UserPlus: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>`,
            UserMinus: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="22" y1="11" x2="16" y2="11"/>`,
            Bell: `<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>`,
            Filter: `<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>`
        };

        const Icon = ({ name, size = 14, className = "" }) => {
            if (!SVG_PATHS[name]) return null;
            return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`inline-flex items-center justify-center ${name === 'Loader2' ? 'animate-spin' : ''} ${className}`} width={size} height={size} dangerouslySetInnerHTML={{ __html: SVG_PATHS[name] }} />;
        };

        const CHART_COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#64748b', '#14b8a6'];
        const MONTH_NAMES = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];

        const removeAccents = (str) => str ? String(str).normalize('NFD').replace(/[\u0300-\u036f]/g, '') : '';
        const formatCurrency = (val) => { const n = Number(val) || 0; return n >= 1e6 ? `R$ ${(n/1e6).toFixed(2)}M` : n >= 1e3 ? `R$ ${(n/1e3).toFixed(2)}k` : `R$ ${n.toFixed(2)}`; };
        const formatShortNum = (val) => { const n = Number(val) || 0; return n >= 1e6 ? `${(n/1e6).toFixed(1)}M` : n >= 1e3 ? `${(n/1e3).toFixed(1)}k` : n.toFixed(1); };
        const formatCnpj = (cnpj) => { const s = String(cnpj||'').replace(/\D/g, ''); return s; };
        const formatYAxisTick = (val) => { const s = String(val || ''); return s.length > 13 ? s.substring(0, 13) + '...' : s; };

        const getRankBadge = (r) => {
            if (!r) return null;
            if (r <= 20) return <span className="bg-amber-100 text-amber-700 border border-amber-200 px-1 py-0.5 rounded text-[7px] font-black shrink-0">TOP 20 (#{r})</span>;
            if (r <= 50) return <span className="bg-blue-100 text-blue-700 border border-blue-200 px-1 py-0.5 rounded text-[7px] font-black shrink-0">TOP 50 (#{r})</span>;
            return <span className="bg-slate-100 text-slate-600 border border-slate-200 px-1 py-0.5 rounded text-[7px] font-black shrink-0">RANK #{r}</span>;
        };

        const exportToExcel = (dataToExport, title) => {
            if (!dataToExport || dataToExport.length === 0) { alert("Sem dados."); return; } 
            const h = Object.keys(dataToExport[0]); 
            const csvLines = [h.join(';')];
            dataToExport.forEach(row => { csvLines.push(h.map(k => `"${String(row[k] || '').replace(/"/g, '""')}"`).join(';')); });
            const csv = csvLines.join('\n'); 
            const b = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' }); 
            const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = `${title}.csv`; l.click();
        };

        const DebouncedInput = ({ value, onChange, placeholder, icon }) => {
            const [localVal, setLocalVal] = useState(value || ''); const ref = useRef(onChange);
            useEffect(() => { ref.current = onChange; }, [onChange]);
            useEffect(() => { setLocalVal(value || ''); }, [value]);
            useEffect(() => { const id = setTimeout(() => ref.current(localVal), 300); return () => clearTimeout(id); }, [localVal]);
            return (
                <div className="relative flex items-center h-[28px]">
                    <Icon name={icon} className="absolute left-2.5 text-slate-400 pointer-events-none" size={12} />
                    <input type="text" placeholder={placeholder} value={localVal} onChange={e => setLocalVal(e.target.value)} className="w-full h-full pl-7 pr-6 bg-white border border-slate-200 rounded-lg text-[10px] font-semibold focus:ring-2 focus:ring-blue-500 outline-none text-slate-700 shadow-sm transition-shadow" />
                    {localVal && <button onClick={() => { setLocalVal(''); ref.current(''); }} className="absolute right-0 w-7 h-full flex items-center justify-center text-slate-400 hover:text-rose-500"><Icon name="X" size={10} /></button>}
                </div>
            );
        };

        const CustomSelect = ({ label, options, selected, onChange, placeholder, multi = false, searchable = false }) => {
            const [isOpen, setIsOpen] = useState(false); const [term, setTerm] = useState(''); const ref = useRef(null);
            useEffect(() => { const handleClickOutside = (e) => { if (ref.current && !ref.current.contains(e.target)) setIsOpen(false); }; document.addEventListener('mousedown', handleClickOutside); return () => document.removeEventListener('mousedown', handleClickOutside); }, []);
            const filteredOptions = searchable && term ? options.filter(o => removeAccents(String(o.label || '').toLowerCase()).includes(removeAccents(term.toLowerCase()))) : options;
            const toggleSingle = (val) => { onChange(val); setIsOpen(false); setTerm(''); };
            const toggleMulti = (val) => { if (selected.includes(val)) onChange(selected.filter(x => x !== val)); else onChange([...selected, val]); };
            const toggleAll = () => { if (options.length > 0 && options.every(o => selected.includes(o.value))) onChange([]); else onChange(options.map(o => o.value)); };
            const displayLabel = multi ? (selected.length === 0 ? placeholder : selected.length === options.length ? 'Todos' : `${selected.length} selec.`) : (options.find(o => o.value === selected)?.label || placeholder);
            return (
                <div className="relative flex flex-col gap-1 min-w-[120px] flex-1" ref={ref}>
                    {label && <label className="text-[8px] font-black text-slate-500 uppercase tracking-wider">{label}</label>}
                    <div className="bg-white border border-slate-200 rounded-lg px-2.5 py-1 text-[10px] font-bold text-slate-700 cursor-pointer flex justify-between items-center shadow-sm h-[28px] hover:bg-slate-50 transition-colors" onClick={() => setIsOpen(!isOpen)}>
                        <span className="truncate max-w-[140px]">{displayLabel}</span><Icon name="ChevronDown" size={10} className="text-slate-400 shrink-0 ml-1" />
                    </div>
                    {isOpen && (
                        <div className="absolute top-[105%] left-0 w-full min-w-[180px] bg-white border border-slate-200 rounded-xl shadow-xl z-50 max-h-64 flex flex-col overflow-hidden">
                            {searchable && (
                                <div className="p-2 border-b border-slate-100 bg-slate-50 flex items-center relative">
                                    <Icon name="Search" size={10} className="text-slate-400 absolute left-4 pointer-events-none" />
                                    <input type="text" placeholder="Pesquisar..." className="w-full pl-7 pr-4 py-1 text-[10px] font-semibold bg-white border border-slate-200 rounded-lg outline-none focus:ring-1 focus:ring-blue-500" onChange={e => setTerm(e.target.value)} value={term} />
                                </div>
                            )}
                            <div className="overflow-y-auto custom-scroll p-1.5 flex flex-col gap-0.5" style={{maxHeight: '180px'}}>
                                {multi && <label className="flex items-center gap-2 text-[10px] font-bold cursor-pointer px-2 py-1.5 hover:bg-slate-100 rounded-lg transition-colors"><input type="checkbox" checked={options.length > 0 && options.every(o => selected.includes(o.value))} onChange={toggleAll} className="w-3 h-3 accent-blue-600 rounded" /> <span className="text-blue-700">Selecionar Todos</span></label>}
                                {filteredOptions.map(o => <label key={String(o.value)} onClick={() => { if (!multi) toggleSingle(o.value); }} className={`flex items-center gap-2 text-[10px] font-semibold cursor-pointer px-2 py-1.5 rounded-lg transition-colors ${!multi && selected === o.value ? 'bg-blue-50 text-blue-700' : 'hover:bg-slate-50'}`}>{multi && <input type="checkbox" checked={selected.includes(o.value)} onChange={() => toggleMulti(o.value)} className="w-3 h-3 accent-blue-600 rounded" />}<span className="truncate">{String(o.label)}</span></label>)}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CustomMultiSelect = ({ label, options, selected = [], onChange, placeholder, searchable }) => <CustomSelect label={label} options={options} selected={selected} onChange={onChange} placeholder={placeholder} searchable={searchable} multi={true} />;

        const SortHeader = ({ label, isRight, activeSort, sortDir, onSort }) => (
            <th className={`px-3 py-2 ${isRight ? 'text-right' : 'text-left'} cursor-pointer hover:bg-slate-100 transition-colors border-b border-slate-100`} onClick={onSort}>
                <div className={`flex items-center gap-1.5 ${isRight ? 'justify-end' : ''} ${activeSort ? 'text-blue-600' : ''}`}>{String(label)} {activeSort && <Icon name="ChevronDown" size={10} className={`transition-transform ${sortDir === 'asc' ? 'rotate-180' : ''}`} />}</div>
            </th>
        );

        const DataTable = ({ cols, data, footer, onRowClick, selectedRowValue, rowKey="name" }) => (
            <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm mt-3">
                <div className="overflow-y-auto custom-scroll" style={{maxHeight: '300px'}}>
                    <table className="w-full text-left border-collapse min-w-[600px]">
                        <thead className="bg-slate-50 sticky top-0 shadow-sm z-10">
                            <tr className="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-200">
                                {cols.map((c, i) => c.sort ? <SortHeader key={i} label={c.label} isRight={c.align === 'text-right'} activeSort={c.activeSort} sortDir={c.sortDir} onSort={c.sort} /> : <th key={i} className={`px-3 py-2 ${c.align || 'text-left'}`}>{String(c.label)}</th>)}
                            </tr>
                        </thead>
                        <tbody className="bg-white">
                            {data.map((r, i) => (
                                <tr key={i} onClick={() => { if (onRowClick) onRowClick(r); }} className={`border-b border-slate-50 transition-colors ${onRowClick ? 'cursor-pointer hover:bg-slate-50' : 'hover:bg-slate-50'} ${selectedRowValue && selectedRowValue === r[rowKey] ? 'bg-blue-50 border-l-4 border-blue-500' : 'border-l-4 border-transparent'}`}>
                                    {cols.map((c, j) => <td key={j} className={`px-3 py-2 text-[10px] ${c.align || 'text-left'}`}>{c.val(r, i)}</td>)}
                                </tr>
                            ))}
                            {data.length === 0 && <tr><td colSpan={cols.length} className="py-8 text-center text-[10px] text-slate-400 font-bold bg-slate-50/50">Sem dados correspondentes para exibir.</td></tr>}
                        </tbody>
                        {footer && <tfoot className="bg-slate-50 sticky bottom-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] border-t border-slate-200">{footer}</tfoot>}
                    </table>
                </div>
            </div>
        );

        const CustomTreemapContentRecharts = (props) => {
            const { x, y, width, height, index, name, value, root } = props;
            if (width < 25 || height < 25) return null; 
            const sName = String(name || ''); 
            const pct = root && root.value ? ((value / root.value) * 100).toFixed(1) : 0;
            return (
                <g>
                    <rect x={x} y={y} width={width} height={height} fill={CHART_COLORS[(index||0)%CHART_COLORS.length]} stroke="#fff" strokeWidth={1} rx={3} ry={3} />
                    {width > 45 && height > 35 && sName && (
                        <text x={x+width/2} y={y+height/2-6} textAnchor="middle" fill="#ffffff" fontSize={11} fontWeight="900" dominantBaseline="central" stroke="#000000" strokeWidth="3" paintOrder="stroke" strokeLinejoin="round">{sName.length > 14 ? sName.substring(0, 14)+'...' : sName}</text>
                    )}
                    {width > 45 && height > 35 && (
                        <text x={x+width/2} y={y+height/2+8} textAnchor="middle" fill="#ffffff" fontSize={10} fontWeight="900" dominantBaseline="central" stroke="#000000" strokeWidth="3" paintOrder="stroke" strokeLinejoin="round">{formatShortNum(value)} ({pct}%)</text>
                    )}
                </g>
            );
        };

        const TooltipBox = ({ title, children }) => (
            <div className="bg-slate-900 p-2.5 rounded-xl shadow-2xl border border-slate-700 text-[10px] z-50 text-white min-w-[160px]">
                {title && <p className="font-black text-blue-300 mb-1.5 border-b border-slate-700 pb-1.5 truncate">{title}</p>}
                <div className="flex flex-col gap-1">{children}</div>
            </div>
        );

        const CustomUFTooltip = ({ active, payload }) => {
            if (!active || !payload?.length) return null; const d = payload[0].payload || {};
            return (
                <TooltipBox title={null}>
                    <div className="flex items-center gap-1.5 mb-1.5 border-b border-slate-700 pb-1.5"><div className="w-2 h-2 rounded-full" style={{backgroundColor: payload[0].fill}}></div><p className="font-black truncate text-white">{String(d.name || '')}</p></div>
                    <div className="flex justify-between items-center gap-3"><span className="text-[9px] text-slate-400">Total:</span><strong className="text-[11px] text-emerald-400">{formatCurrency(d.value)}</strong></div>
                </TooltipBox>
            );
        };

        const CustomScatterTooltip = ({ active, payload }) => {
            if (!active || !payload?.length) return null; const d = payload[0].payload || {};
            return (
                <TooltipBox title={d.name}>
                    <div className="flex justify-between items-center gap-3 mb-1"><span className="text-[9px] text-slate-400">Faturamento:</span><span className="text-[11px] font-black text-emerald-400">{formatCurrency(d.fatCur)}</span></div>
                    <div className="flex justify-between items-center gap-3"><span className="text-[9px] text-slate-400">Crescimento:</span><span className={`text-[10px] font-black flex items-center gap-1 ${d.growth>=0?'text-emerald-400':'text-rose-400'}`}><Icon name={d.growth>=0?'TrendingUp':'TrendingDown'} size={10}/>{d.growth>0?'+':''}{Number(d.growth || 0).toFixed(1)}%</span></div>
                </TooltipBox>
            );
        };

        const CustomYoyTooltip = ({ active, payload, label, yearComparison, isProduct }) => {
            if (!active || !payload?.length || !yearComparison) return null;
            const d = payload[0].payload || {}; 
            const cV = d.curVal||0; const pV = d.compVal||0; const cQ = d.qtyCur||0; const pQ = d.qtyComp||0;

        // --- Aplicação Principal ---
        const DashboardApp = () => {

            const [modalClientFilter, setModalClientFilter] = useState('TODOS');

            const [clientSortConfig, setClientSortConfig] = useState({ column: 'fatCur', direction: 'desc' });
            const [matrizSortConfig, setMatrizSortConfig] = useState({ column: 'fatCur', direction: 'desc' });
            const [abcDimension, setAbcDimension] = useState('clientes');
            const [modalEvolucaoMode, setModalEvolucaoMode] = useState('faturamento');
            const [activeManualTab, setActiveManualTab] = useState('conceitos'); 
            const [initialFilters, setInitialFilters] = useState(null);
            const [matrixShowInactive, setMatrixShowInactive] = useState(false);
            const [isPdfMode, setIsPdfMode] = useState(false);

            const handleFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                setIsLoadingAuto(true); setErrorMsg(null); setShowUploadScreen(false);

                setTimeout(() => {
                    let keys = null;
                    let maxDateTs = 0; 
                    const resData = []; 
                    let missingDateRows = 0; 
                    let maxFoundYear = 0;
                    
                    const parseNum = v => { 
                        if (!v) return 0; if (typeof v === 'number') return v;
                        let str = String(v).trim().replace(/[^\d.,-]/g, '');
                        if (!str || str === '-') return 0;
                        const lC = str.lastIndexOf(','); const lP = str.lastIndexOf('.');
                        if (lC !== -1 && lP !== -1) { if (lC > lP) { str = str.replace(/\./g, '').replace(',', '.'); } else { str = str.replace(/,/g, ''); } } 
                        else if (lC !== -1) { if ((str.match(/,/g) || []).length > 1) { str = str.replace(/,/g, ''); } else { str = str.replace(',', '.'); } }
                        return parseFloat(str) || 0;
                    };

                    Papa.parse(file, {
                        header: true,
                        skipEmptyLines: 'greedy',
                        chunkSize: 1024 * 1024 * 3,
                        chunk: (results, parser) => {
                            if (!keys && results.meta && results.meta.fields) {
                                const originalHeaders = results.meta.fields || [];
                                const cleanHeaders = originalHeaders.map(h => removeAccents(String(h || '').trim().toLowerCase()).replace(/[^a-z0-9]/g, ''));
                                const aliases = {
                                    a: ['amount', 'faturamento', 'total', 'valor', 'venda', 'vendas', 'receita', 'fat', 'vlr', 'bruto', 'liquido', 'valortotal', 'receitabruta', 'vlrliquido'],
                                    q: ['qty', 'quantidade', 'volume', 'qtd', 'qtde', 'pecas', 'unid', 'unidades', 'peso', 'qnt', 'qntd', 'quant'],
                                    ct: ['tipocliente', 'canal', 'segmento', 'tipodecliente', 'customertype', 'ramo', 'classificacao', 'grupoparceiro'],
                                    c: ['cliente', 'nomefantasia', 'razaosocial', 'parceiro', 'customer', 'pdv', 'loja', 'nome', 'comprador', 'destinatario'],
                                    d: ['distribuidor', 'revenda', 'distributor', 'fornecedor', 'rede', 'representante', 'vendedor', 'equipe'],
                                    p: ['produto', 'material', 'descricao', 'product', 'item', 'standard', 'desc', 'sku', 'codigo', 'codigoproduto', 'nomeproduto'],
                                    s: ['uf', 'estado', 'state', 'ufcliente', 'regiao'],
                                    ci: ['cidade', 'municipio', 'city', 'local', 'cidadecliente'],
                                    t: ['unidade', 'filial', 'type', 'empresa'],
                                    y: ['ano', 'year', 'exercicio'],
                                    m: ['mes', 'month', 'periodo'],
                                    dt: ['data', 'emissao', 'date', 'dtemissao', 'criacao', 'lancamento', 'movimento', 'documento', 'dataemissao', 'datavenda', 'mesano'],
                                    cj: ['cnpj', 'cgc', 'documento', 'cpf', 'doc', 'id', 'cgccpf']
                                };
                                const findKey = (aliasArr) => {
                                    let idx = cleanHeaders.findIndex(k => aliasArr.includes(k));
                                    if (idx !== -1) return originalHeaders[idx];
                                    idx = cleanHeaders.findIndex(k => aliasArr.some(alias => k === alias || k.includes(alias)));
                                    return idx !== -1 ? originalHeaders[idx] : null;
                                };
                                keys = { a: findKey(aliases.a), q: findKey(aliases.q), ct: findKey(aliases.ct), c: findKey(aliases.c), d: findKey(aliases.d), p: findKey(aliases.p), s: findKey(aliases.s), ci: findKey(aliases.ci), t: findKey(aliases.t), y: findKey(aliases.y), m: findKey(aliases.m), dt: findKey(aliases.dt), cj: findKey(aliases.cj) };
                                
                                if (!keys.a && !keys.q) {
                                    parser.abort();
                                    setErrorMsg("Colunas numéricas não encontradas.");
                                    setIsLoadingAuto(false);
                                    setShowUploadScreen(true);
                                    return;
                                }
                            }

                            const raw = results.data;
                            if (!keys || !raw) return;

                            for (let i = 0; i < raw.length; i++) {
                                const r = raw[i]; const o = {};
                                o._amount = keys.a ? parseNum(r[keys.a]) : 0; o._qty = keys.q ? parseNum(r[keys.q]) : 0;
                                if (o._amount === 0 && o._qty === 0) continue;
                                o._customerType = keys.ct && r[keys.ct] ? String(r[keys.ct]).trim() : 'N/I';
                                o._customer = keys.c && r[keys.c] ? String(r[keys.c]).trim() : 'Não Informado';
                                o._distributor = keys.d && r[keys.d] ? String(r[keys.d]).trim() : 'Não Informado';
                                o._product = keys.p && r[keys.p] ? String(r[keys.p]).trim() : 'Não Informado';
                                o._state = keys.s && r[keys.s] ? String(r[keys.s]).trim().toUpperCase() : 'N/I';
                                o._city = keys.ci && r[keys.ci] ? String(r[keys.ci]).trim().toUpperCase() : 'N/I';
                                o._type = keys.t && r[keys.t] ? String(r[keys.t]).trim() : 'N/I';
                                o.cnpj = keys.cj && r[keys.cj] ? String(r[keys.cj]).replace(/\D/g, '') : '';
                                let y = keys.y && r[keys.y] ? parseInt(String(r[keys.y]).replace(/\D/g, ''), 10) : 0; 
                                let m = keys.m && r[keys.m] ? parseInt(String(r[keys.m]).replace(/\D/g, ''), 10) : 0; 
                                let dDay = 1; let rDate = keys.dt && r[keys.dt] ? String(r[keys.dt]).trim().split(' ')[0] : ''; let ts = 0; let dDate = '';
                                if (rDate) {
                                    if (rDate.includes('/')) { const parts = rDate.split('/'); dDay = parseInt(parts[0], 10) || 1; m = m || parseInt(parts[1], 10); y = y || parseInt(parts[parts.length > 2 ? 2 : 0], 10); } 
                                    else if (rDate.includes('-')) { const parts = rDate.split('-'); if (parts[0].length === 4) { y = parseInt(parts[0], 10) || 0; m = parseInt(parts[1], 10) || 0; dDay = parseInt(parts[2], 10) || 1; } else { dDay = parseInt(parts[0], 10) || 1; m = parseInt(parts[1], 10) || 0; y = parseInt(parts[2], 10) || 0; } } 
                                    else if (rDate.length === 8 && !isNaN(rDate)) { y = y || parseInt(rDate.substring(0,4), 10); m = m || parseInt(rDate.substring(4,6), 10); dDay = parseInt(rDate.substring(6,8), 10) || 1; }
                                }
                                if (y > 0 && y < 100) y += 2000;
                                if (y > 0 && m > 0) { ts = new Date(y, m - 1, dDay, 12, 0, 0).getTime(); dDate = `${String(dDay).padStart(2, '0')}/${String(m).padStart(2, '0')}/${String(y)}`; } 
                                else { const now = new Date(); y = now.getFullYear(); m = now.getMonth() + 1; dDay = now.getDate(); ts = new Date(y, m - 1, dDay, 12, 0, 0).getTime(); dDate = `${String(dDay).padStart(2, '0')}/${String(m).padStart(2, '0')}/${String(y)}`; missingDateRows++; }
                                o._year = y || 0; o._month = m || 0; o._timestamp = ts; o._displayDate = dDate || 'N/I';
                                o._customerNorm = removeAccents(o._customer).toLowerCase(); o._productNorm = removeAccents(o._product).toLowerCase(); o._cityNorm = removeAccents(o._city).toLowerCase();
                                if (currentUser && currentUser.role !== 'admin' && !currentUser.estados.includes(o._state)) continue;
                                if (y > maxFoundYear) maxFoundYear = y;
                                resData.push(o); if (ts && ts > maxDateTs) maxDateTs = ts; 
                            }
                        },
                        complete: () => {
                            if (errorMsg) return; 
                            if (resData.length === 0) {
                                setErrorMsg("Base lida, mas sem dados válidos para a sua região."); 
                                setIsLoadingAuto(false);
                                setShowUploadScreen(true);
                                return;
                            }
                            const wispTypes = [...new Set(resData.map(x => x._customerType))].filter(t => String(t).toUpperCase().includes('WISP'));
                            setData(resData); setIsLoaded(true); 
                            const initialF = { searchCustomer: '', searchProduct: '', years: maxFoundYear > 0 ? [String(maxFoundYear)] : [], months: [], state: [], city: [], distributor: [], customerType: wispTypes, type: [], product: [] };
                            setFilters(initialF); setInitialFilters(initialF);
                            let warningTxt = missingDateRows > 0 ? ` | Aviso: ${missingDateRows} vendas sem data` : "";
                            if (maxDateTs > 0) { const d = new Date(maxDateTs); setLastUpdate(`${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}${warningTxt}`); } 
                            else { setLastUpdate(`Sincronizado${warningTxt}`); }
                            setIsLoadingAuto(false);
                        },
                        error: (err) => {
                            setErrorMsg("Erro na leitura: " + err.message); 
                            setIsLoadingAuto(false); 
                            setShowUploadScreen(true);
                        }
                    });
                }, 100); 
                
                if (e.target) e.target.value = null;
            };

            const verifyPassword = () => {
                if (!passwordValue) return; const hashInput = btoa(passwordValue.trim().toLowerCase()); const userMatch = USUARIOS.find(u => u.hash === hashInput);
                if (userMatch) { setCurrentUser(userMatch); setIsAdminVerified(true); setShowUploadScreen(true); setPasswordValue(''); setPasswordError(false); } 
                else { setPasswordError(true); }
            };

            const openModal = (type) => { setModalConfig({ isOpen: true, type }); setLocalModalSearch(''); if (type === 'abc') setModalAbcFilter('TODOS'); if (type === 'representatividade') setModalRepFilter('TODOS'); if (type === 'analitico') setAnaliticoSortConfig({ column: 'data', direction: 'desc' }); if (type === 'matriz') setMatrizSortConfig({ column: 'fatCur', direction: 'desc' }); };
            
            const exportToPDF = () => {
                setIsPdfMode(true);
                setTimeout(() => {
                    const element = modalConfig.isOpen ? document.getElementById('modal-export-area') : document.getElementById('main-dashboard-export-area');
                    if (!element) { setIsPdfMode(false); return; }
