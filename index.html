<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Comercial Avançado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; } 
        .recharts-cartesian-grid-horizontal line { stroke: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .modal-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .modal-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .export-mode-active { border-radius: 0 !important; box-shadow: none !important; max-height: none !important; height: auto !important; }
        .export-mode-active .modal-scroll { overflow: visible !important; max-height: none !important; }
        .export-mode-active .no-export, .export-mode-active .hide-on-export { display: none !important; }
        .export-only { display: none !important; }
        .export-mode-active .export-only { display: table-row !important; }
        .export-mode-active .truncate { white-space: normal !important; overflow: visible !important; text-overflow: clip !important; max-width: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar, Cell, PieChart, Pie, Legend, ReferenceLine, ComposedChart } = window.Recharts;

        const USUARIOS = [
            { nome: "Diretoria (Admin)", estados: "ALL", role: "admin", hash: "YWRtaW4uZGly" },
            { nome: "George Silva (Admin)", estados: "ALL", role: "admin", hash: "Z3NpbHZhMDAx" },
            { nome: "Luiz Hamilton", estados: ["AC", "AP", "AM", "MA", "PA", "RO", "RR"], role: "ev", hash: "bHVpei5oYW1pbHRvbg==" },
            { nome: "George Silva", estados: ["AL", "BA", "PE", "SE"], role: "ev", hash: "Z2VvcmdlLnNpbHZh" },
            { nome: "Carine Pellegrino", estados: ["CE", "PB", "PI", "RN"], role: "ev", hash: "Y2FyaW5lLnBlbGxlZ3Jpbm8=" },
            { nome: "Diego Garcia", estados: ["DF", "GO", "TO"], role: "ev", hash: "ZGllZ28uZ2FyY2lh" },
            { nome: "Aldemir Neto", estados: ["ES", "RJ"], role: "ev", hash: "YWxkZW1pci5uZXRv" },
            { nome: "Caique Musto", estados: ["MG"], role: "ev", hash: "Y2FpcXVlLm11c3Rv" },
            { nome: "Diego Ceirutti", estados: ["PR", "SC"], role: "ev", hash: "ZGllZ28uY2VpcnV0dGk=" },
            { nome: "Fiad Neto", estados: ["RS", "SC"], role: "ev", hash: "ZmlhZC5uZXRv" },
            { nome: "Juliana Passo", estados: ["SP"], role: "ev", hash: "anVsaWFuYS5wYXNzbw==" }
        ];

        const svgPrefix = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" `;
        const SVG_ICONS = {
            TrendingUp: `<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>`,
            TrendingDown: `<polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/>`,
            Search: `<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`,
            ChevronDown: `<polyline points="6 9 12 15 18 9"/>`,
            MapPin: `<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>`,
            Truck: `<rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle>`,
            Users: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`,
            X: `<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,
            Clock: `<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>`,
            Package: `<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>`,
            List: `<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>`,
            AlertCircle: `<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>`,
            UserPlus: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>`,
            UserMinus: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="22" y1="11" x2="16" y2="11"/>`,
            Bell: `<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>`,
            Loader2: `<path d="M21 12a9 9 0 1 1-6.219-8.56"/>`,
            Upload: `<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>`,
            Target: `<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>`,
            Download: `<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>`,
            FileSpreadsheet: `<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M8 13h2"></path><path d="M8 17h2"></path><path d="M14 13h2"></path><path d="M14 17h2"></path>`,
            BookOpen: `<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>`
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const content = SVG_ICONS[name];
            if (!content) return null;
            return <span className={`inline-flex items-center justify-center ${name === 'Loader2' ? 'animate-spin' : ''}`} dangerouslySetInnerHTML={{ __html: `${svgPrefix} class="${className}" width="${size}" height="${size}">${content}</svg>` }} />;
        };

        const TrendingUp = (p) => <Icon name="TrendingUp" {...p} />;
        const TrendingDown = (p) => <Icon name="TrendingDown" {...p} />;
        const Search = (p) => <Icon name="Search" {...p} />;
        const ChevronDown = (p) => <Icon name="ChevronDown" {...p} />;
        const MapPin = (p) => <Icon name="MapPin" {...p} />;
        const Truck = (p) => <Icon name="Truck" {...p} />;
        const Users = (p) => <Icon name="Users" {...p} />;
        const X = (p) => <Icon name="X" {...p} />;
        const Clock = (p) => <Icon name="Clock" {...p} />;
        const Package = (p) => <Icon name="Package" {...p} />;
        const List = (p) => <Icon name="List" {...p} />;
        const AlertCircle = (p) => <Icon name="AlertCircle" {...p} />;
        const UserPlus = (p) => <Icon name="UserPlus" {...p} />;
        const UserMinus = (p) => <Icon name="UserMinus" {...p} />;
        const Bell = (p) => <Icon name="Bell" {...p} />;
        const Loader2 = (p) => <Icon name="Loader2" {...p} />;
        const Upload = (p) => <Icon name="Upload" {...p} />;
        const Target = (p) => <Icon name="Target" {...p} />;
        const Download = (p) => <Icon name="Download" {...p} />;
        const FileSpreadsheet = (p) => <Icon name="FileSpreadsheet" {...p} />;
        const BookOpen = (p) => <Icon name="BookOpen" {...p} />;

        const CHART_COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#64748b', '#14b8a6'];
        const MONTH_NAMES = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];

        const removeAccents = (str) => str ? String(str).normalize('NFD').replace(/[\u0300-\u036f]/g, '') : '';
        const formatCurrency = (val) => { const numVal = Number(val) || 0; if (numVal >= 1000000) return `R$ ${(numVal/1000000).toFixed(2)}M`; if (numVal >= 1000) return `R$ ${(numVal/1000).toFixed(2)}k`; return `R$ ${numVal.toFixed(2)}`; };
        const formatShortNumber = (val) => { const numVal = Number(val) || 0; if (numVal >= 1000000) return `${(numVal/1000000).toFixed(1)}M`; if (numVal >= 1000) return `${(numVal/1000).toFixed(1)}k`; return numVal.toFixed(1); };
        const formatYAxisTick = (val) => val ? (String(val).length > 20 ? String(val).substring(0, 20) + '...' : String(val)) : '';

        const getRankBadge = (rank) => {
            if (!rank) return null;
            if (rank <= 20) return <span className="bg-amber-100 text-amber-700 border border-amber-200 px-2 py-0.5 rounded text-[9px] font-black shrink-0">TOP 20 (🏆 #{rank})</span>;
            if (rank <= 50) return <span className="bg-blue-100 text-blue-700 border border-blue-200 px-2 py-0.5 rounded text-[9px] font-black shrink-0">TOP 50 (⭐ #{rank})</span>;
            if (rank <= 100) return <span className="bg-emerald-100 text-emerald-700 border border-emerald-200 px-2 py-0.5 rounded text-[9px] font-black shrink-0">TOP 100 (🚀 #{rank})</span>;
            return <span className="bg-slate-100 text-slate-600 border border-slate-200 px-2 py-0.5 rounded text-[9px] font-black shrink-0">RANK #{rank}</span>;
        };

        const renderBarLabel = (isFat, color) => (props) => {
            const { x, y, width, height, value } = props;
            if (value === undefined || value === null) return null;
            return (
                <text x={(x||0) + (width||0) + 4} y={(y||0) + (height||0) / 2 + 1} fill={color} textAnchor="start" dominantBaseline="central" fontSize="9" fontWeight="bold">
                    {isFat ? `R$ ${formatShortNumber(value)}` : `${(Number(value) || 0).toLocaleString('pt-BR')} un`}
                </text>
            );
        };

        const DebouncedInput = ({ value, onChange, placeholder, icon }) => {
            const [localVal, setLocalVal] = useState(value || '');
            const onChangeRef = useRef(onChange);
            useEffect(() => { onChangeRef.current = onChange; }, [onChange]);
            useEffect(() => { setLocalVal(value || ''); }, [value]);
            useEffect(() => { const id = setTimeout(() => { onChangeRef.current(localVal); }, 300); return () => clearTimeout(id); }, [localVal]);
            return (
                <div className="relative flex items-center h-[28px] lg:h-[30px]">
                    <Icon name={icon} className="absolute left-2 text-slate-400 pointer-events-none" size={12} />
                    <input type="text" placeholder={placeholder} value={localVal} onChange={e => setLocalVal(e.target.value)} className="w-full h-full pl-7 pr-7 bg-slate-50 border border-slate-200 rounded-md text-[10px] font-semibold focus:ring-1 focus:ring-blue-500 outline-none text-slate-700 transition-all" />
                    {localVal && <button onClick={() => { setLocalVal(''); onChangeRef.current(''); }} className="absolute right-0 w-7 h-full flex items-center justify-center text-slate-400 hover:text-rose-500 transition-colors rounded-r-md no-export"><X size={12}/></button>}
                </div>
            );
        };

        const CustomSingleSelect = ({ label, options, selected, onChange, placeholder, searchable = false }) => {
            const [isOpen, setIsOpen] = useState(false); const [searchTerm, setSearchTerm] = useState(''); const ref = useRef(null);
            const safeOptions = Array.isArray(options) ? options : [];
            useEffect(() => { const handleClickOutside = (e) => { if (ref.current && !ref.current.contains(e.target)) setIsOpen(false); }; document.addEventListener('mousedown', handleClickOutside); return () => document.removeEventListener('mousedown', handleClickOutside); }, []);
            const filteredOptions = searchable && searchTerm ? safeOptions.filter(o => removeAccents(String(o.label || '').toLowerCase()).includes(removeAccents(searchTerm.toLowerCase()))) : safeOptions;
            const selectedLabel = safeOptions.find(o => o.value === selected)?.label || placeholder;
            return (
                <div className="relative flex flex-col gap-0.5 min-w-[180px] flex-1" ref={ref}>
                    {label && <label className="text-[8px] font-black text-slate-400 uppercase tracking-wider">{label}</label>}
                    <div className="bg-white border border-slate-200 rounded-md px-2 py-1 text-[10px] font-semibold text-slate-700 cursor-pointer flex justify-between items-center hover:bg-slate-50 transition-colors shadow-sm h-[28px] lg:h-[30px]" onClick={() => setIsOpen(!isOpen)}>
                        <span className="truncate max-w-[200px]" title={selectedLabel}>{selectedLabel}</span><ChevronDown size={12} className="text-slate-400 shrink-0 ml-1 no-export" />
                    </div>
                    {isOpen && (
                        <div className="absolute top-[105%] left-0 w-full min-w-[240px] bg-white border border-slate-200 rounded-md shadow-xl z-50 max-h-60 flex flex-col overflow-hidden no-export">
                            {searchable && (
                                <div className="p-1.5 border-b border-slate-100 bg-slate-50 flex items-center relative">
                                    <Search size={10} className="text-slate-400 absolute left-3 pointer-events-none" />
                                    <input type="text" placeholder="Pesquisar..." className="w-full pl-6 pr-6 py-1 text-[10px] font-semibold bg-white border border-slate-200 rounded outline-none focus:ring-1 focus:ring-blue-500 transition-all" onChange={(e) => setSearchTerm(e.target.value)} value={searchTerm} />
                                    {searchTerm && <button onClick={() => setSearchTerm('')} className="absolute right-2 text-slate-400 hover:text-rose-500"><X size={10} /></button>}
                                </div>
                            )}
                            <div className="overflow-y-auto custom-scroll p-1 flex flex-col gap-0.5">
                                {filteredOptions.slice(0, 100).map(opt => (
                                    <div key={opt.value} onClick={() => { onChange(opt.value); setIsOpen(false); setSearchTerm(''); }} className={`flex items-center gap-1.5 text-[10px] font-semibold cursor-pointer px-2 py-1.5 rounded transition-colors ${selected === opt.value ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-100'}`}>
                                        <span className="truncate" title={opt.label}>{opt.label}</span>
                                    </div>
                                ))}
                                {filteredOptions.length > 100 && <div className="p-2 text-center text-[9px] text-slate-400 font-semibold">+ {filteredOptions.length - 100} itens (Use a pesquisa)</div>}
                                {filteredOptions.length === 0 && <div className="p-2 text-center text-[9px] text-slate-400 font-semibold">Nenhum resultado.</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CustomMultiSelect = ({ label, options, selected = [], onChange, placeholder, searchable = false }) => {
            const [isOpen, setIsOpen] = useState(false); const [searchTerm, setSearchTerm] = useState(''); const ref = useRef(null);
            const safeOptions = Array.isArray(options) ? options : []; const safeSelected = Array.isArray(selected) ? selected : [];
            useEffect(() => { const handleClickOutside = (e) => { if (ref.current && !ref.current.contains(e.target)) setIsOpen(false); }; document.addEventListener('mousedown', handleClickOutside); return () => document.removeEventListener('mousedown', handleClickOutside); }, []);
            const filteredOptions = searchable && searchTerm ? safeOptions.filter(o => removeAccents(String(o.label || '').toLowerCase()).includes(removeAccents(searchTerm.toLowerCase()))) : safeOptions;
            
            const handleSelectAll = () => {
                if (safeOptions.length > 0 && safeOptions.every(o => safeSelected.includes(o.value))) {
                    onChange([]);
                } else {
                    onChange(safeOptions.map(o => o.value));
                }
            };

            return (
                <div className="relative flex flex-col gap-0.5 min-w-[100px] flex-1" ref={ref}>
                    {label && <label className="text-[8px] font-black text-slate-400 uppercase tracking-wider">{label}</label>}
                    <div className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-semibold text-slate-700 cursor-pointer flex justify-between items-center hover:bg-slate-100 transition-colors h-[32px] lg:h-[34px]" onClick={() => setIsOpen(!isOpen)}>
                        <span className="truncate">{safeSelected.length === 0 ? placeholder : safeSelected.length === safeOptions.length ? 'Todos' : `${safeSelected.length} selec.`}</span><ChevronDown size={14} className="text-slate-400 shrink-0 ml-1 no-export" />
                    </div>
                    {isOpen && (
                        <div className="absolute top-[105%] left-0 w-full min-w-[180px] bg-white border border-slate-200 rounded-lg shadow-xl z-50 max-h-60 flex flex-col overflow-hidden no-export">
                            {searchable && (
                                <div className="p-1.5 border-b border-slate-100 bg-white flex items-center relative">
                                    <Search size={10} className="text-slate-400 absolute left-3 pointer-events-none" />
                                    <input type="text" placeholder="Pesquisar..." className="w-full pl-6 pr-6 py-1 text-[10px] font-semibold bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-1 focus:ring-blue-500 transition-all" onChange={(e) => setSearchTerm(e.target.value)} value={searchTerm} />
                                    {searchTerm && <button onClick={() => setSearchTerm('')} className="absolute right-2 text-slate-400 hover:text-rose-500"><X size={10} /></button>}
                                </div>
                            )}
                            <div className="overflow-y-auto custom-scroll p-1 flex flex-col gap-0.5">
                                <label className="flex items-center gap-1.5 text-[10px] font-bold text-slate-800 cursor-pointer px-2 py-1.5 hover:bg-slate-100 rounded">
                                    <input type="checkbox" checked={safeOptions.length > 0 && safeOptions.every(o => safeSelected.includes(o.value))} onChange={handleSelectAll} className="w-2.5 h-2.5 accent-blue-600" /> Selecionar Todos
                                </label>
                                {filteredOptions.slice(0, 100).map(opt => (
                                    <label key={opt.value} className="flex items-center gap-1.5 text-[10px] font-semibold text-slate-600 cursor-pointer px-2 py-1 hover:bg-slate-50 rounded transition-colors">
                                        <input type="checkbox" checked={safeSelected.includes(opt.value)} onChange={(e) => { if (e.target.checked) onChange([...safeSelected, opt.value]); else onChange(safeSelected.filter(x => x !== opt.value)); }} className="w-2.5 h-2.5 accent-blue-600 flex-shrink-0" />
                                        <span className="truncate">{opt.label}</span>
                                    </label>
                                ))}
                                {filteredOptions.length > 100 && <div className="p-2 text-center text-[9px] text-slate-400 font-semibold">+ {filteredOptions.length - 100} itens (Use a pesquisa)</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const GrowthBadge = ({ growth, curLabel, prevLabel, invertColors = false, timeMode = 'YTD' }) => {
            if (growth === null || growth === undefined) return <div className="mt-1.5 flex items-center gap-1 text-[8px] font-bold text-slate-400 w-fit">Sem histórico para {timeMode}</div>;
            const isPositive = growth > 0; const isNeutral = growth === 0;
            let colorClass = "text-slate-500"; let IconComp = TrendingUp;
            if (isPositive) { colorClass = invertColors ? "text-rose-500" : "text-emerald-500"; IconComp = TrendingUp; } 
            else if (!isNeutral) { colorClass = invertColors ? "text-emerald-500" : "text-rose-500"; IconComp = TrendingDown; }
            return (
                <div className={`mt-1.5 flex items-center gap-1 text-[9px] font-bold w-fit cursor-help ${colorClass}`} title={`Comparação: ${curLabel} vs ${prevLabel}. Crescimento de ${growth.toFixed(1)}%.`}>
                    <IconComp size={10} />{isPositive ? '+' : ''}{Number(growth || 0).toFixed(1)}% vs Ant.
                </div>
            );
        };

        const CustomYoyTooltip = ({ active, payload, label, isProduct = false, yearComparison, isFatMode = true }) => {
            if (!active || !payload || !payload.length || !yearComparison) return null;
            const dataObj = payload[0].payload;
            const curAmt = Number(dataObj.curVal) || 0; const compAmt = Number(dataObj.compVal) || 0;
            const curQty = Number(dataObj.qtyCur) || 0; const compQty = Number(dataObj.qtyComp) || 0;
            const mainCur = isFatMode ? curAmt : curQty; const mainComp = isFatMode ? compAmt : compQty;
            const growth = mainComp > 0 ? ((mainCur - mainComp) / mainComp) * 100 : null;
            return (
                <div className="bg-slate-900 p-2 rounded border border-slate-700 text-xs z-50 min-w-[200px] shadow-xl text-white">
                    <p className="font-bold mb-1.5 border-b border-slate-700 pb-1 truncate">{label}</p>
                    <div className="flex flex-col gap-1">
                        <div className="flex justify-between items-center gap-3"><span className="text-[10px] text-blue-300">{yearComparison.curLabel}</span><strong className="text-[11px]">{isFatMode ? formatCurrency(curAmt) : `${curQty.toLocaleString('pt-BR')} un`}</strong></div>
                        {payload.length > 1 && <div className="flex justify-between items-center gap-3"><span className="text-[10px] text-slate-400">{yearComparison.prevLabel}</span><strong className="text-[11px] text-slate-300">{isFatMode ? formatCurrency(compAmt) : `${compQty.toLocaleString('pt-BR')} un`}</strong></div>}

                                                            <p className="text-sm text-slate-600 mb-3">No topo do painel, você encontrará botões que mudam toda a perspectiva dos dados. Eles comparam o momento atual com o exato mesmo período anterior:</p>
                                                            <ul className="text-sm space-y-3 list-none pl-0">
                                                                <li className="bg-slate-50 p-3 rounded border border-slate-100"><strong className="text-slate-800">YTD (Acumulado do Ano):</strong> Mostra a performance desde o dia 1º de Janeiro do ano atual até o último mês com vendas. Compara com os mesmos meses do ano anterior.</li>
                                                                <li className="bg-slate-50 p-3 rounded border border-slate-100"><strong className="text-slate-800">UDM (Últimos Doze Meses):</strong> Considera uma janela contínua dos últimos 12 meses. Excelente para remover o efeito de sazonalidade.</li>
                                                                <li className="bg-slate-50 p-3 rounded border border-slate-100"><strong className="text-slate-800">U6M (Últimos 6 Meses):</strong> Foca na tração recente e tendência de curto prazo.</li>
                                                            </ul>
                                                        </section>

                                                        <section>
                                                            <h4 className="text-sm font-black text-blue-600 mb-2 uppercase tracking-wider">3. Indicadores de Performance (KPIs)</h4>
                                                            <ul className="text-sm space-y-3 list-none pl-0">
                                                                <li className="flex items-start gap-2"><span className="text-blue-500 mt-1">•</span><div><strong className="text-slate-800">Faturamento:</strong> Receita bruta total gerada no período.</div></li>
                                                                <li className="flex items-start gap-2"><span className="text-blue-500 mt-1">•</span><div><strong className="text-slate-800">Preço Médio:</strong> Faturamento Total / Quantidade Total vendida. Ajuda a entender descontos ou mudanças de mix.</div></li>
                                                                <li className="flex items-start gap-2"><span className="text-blue-500 mt-1">•</span><div><strong className="text-slate-800">Capilaridade:</strong> Quantidade de PDVs (Pontos de Venda) únicos que compraram no período.</div></li>
                                                                <li className="flex items-start gap-2"><span className="text-blue-500 mt-1">•</span><div><strong className="text-slate-800">Clientes Novos:</strong> Compraram no período atual, mas NÃO tinham registro no período comparativo.</div></li>
                                                                <li className="flex items-start gap-2"><span className="text-blue-500 mt-1">•</span><div><strong className="text-slate-800">Clientes Perdidos (Churn):</strong> Compraram no passado, mas estão zerados no período atual (Inativos).</div></li>
                                                                <li className="flex items-start gap-2"><span className="text-blue-500 mt-1">•</span><div><strong className="text-slate-800">Em Alerta (Risco de Churn):</strong> Clientes ativos que já ultrapassaram o tempo esperado de recompra baseado na sua média mensal.</div></li>
                                                            </ul>
                                                        </section>

                                                        <section>
                                                            <h4 className="text-sm font-black text-blue-600 mb-2 uppercase tracking-wider">4. Visões Gráficas e Raio-X</h4>
                                                            <p className="text-sm leading-relaxed mb-3 text-slate-600">O painel exibe o Top 10 de Produtos, Distribuidores e Clientes. O segredo desta seção são os botões <strong className="text-slate-800">"Raio-X"</strong> em cada bloco. Ao clicar, abrirá uma janela onde você poderá:</p>
                                                            <ul className="text-sm space-y-2 list-disc pl-5 text-slate-600">
                                                                <li>Pesquisar por um cliente/produto específico e ver todo o seu histórico individual.</li>
                                                                <li>Ver os produtos preferidos de um determinado cliente.</li>
                                                                <li>Ver quais clientes mais compram um determinado produto.</li>
                                                            </ul>
                                                        </section>

                                                        <section>
                                                            <h4 className="text-sm font-black text-blue-600 mb-2 uppercase tracking-wider">5. Funcionalidades Avançadas e Exportação</h4>
                                                            <ul className="text-sm space-y-3 list-none pl-0">
                                                                <li className="bg-indigo-50 p-3 rounded border border-indigo-100"><strong className="text-indigo-800">Curva ABC:</strong> Ferramenta estratégica baseada no Princípio de Pareto. Separa os seus itens em Curva A (vital, 80\% da receita), B (potencial, próximos 15\%) e C (cauda longa de alto custo, últimos 5\%).</li>
                                                                <li className="bg-slate-50 p-3 rounded border border-slate-100"><strong className="text-slate-800">Visão Analítica:</strong> Tabela no formato de Excel (Raw Data) refletindo os filtros aplicados no momento.</li>
                                                                <li className="bg-slate-50 p-3 rounded border border-slate-100"><strong className="text-slate-800">Exportação:</strong> Use o botão <strong className="text-rose-600">PDF</strong> para baixar telas limpas para apresentações, e o botão <strong className="text-emerald-600">Excel</strong> para manipular os dados na sua planilha.</li>
                                                            </ul>
                                                        </section>
                                                    </div>
                                                </div>
                                            );
                                        }

                                        if (modalConfig.type === 'abc' && abcData) {
                                            return (
                                                <div className="p-5">
                                                    <div className="flex justify-center gap-2 mb-4 no-export">
                                                         <button onClick={() => { setAbcDimension('clientes'); setModalAbcFilter('TODOS'); }} className={`px-4 py-2 rounded-lg font-black text-[10px] transition-all ${abcDimension === 'clientes' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}`}>Análise por Clientes</button>
                                                         <button onClick={() => { setAbcDimension('produtos'); setModalAbcFilter('TODOS'); }} className={`px-4 py-2 rounded-lg font-black text-[10px] transition-all ${abcDimension === 'produtos' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}`}>Análise por Produtos</button>
                                                    </div>
                                                    
                                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-2 mb-4">
                                                        <div className="bg-emerald-50 border border-emerald-100 p-4 rounded-xl" title="Curva A: Representam a fatia principal e vitalícia do faturamento (Até 80% do Acumulado).">
                                                            <h3 className="text-emerald-800 font-black text-sm cursor-help border-b border-dashed border-emerald-300 w-fit pb-[1px]">Curva A (Top 80%)</h3>
                                                            <p className="text-emerald-600 text-[9px] font-bold mt-1 leading-tight">Concentre os esforços aqui. Maior fatia da receita.</p>
                                                            <div className="mt-2 flex justify-between items-end">
                                                                <div><p className="text-[8px] font-black text-emerald-600 uppercase mb-0.5">Qtd.</p><p className="text-base font-black text-emerald-800">{abcData.countA}</p></div>
                                                                <div className="text-right"><p className="text-[8px] font-black text-emerald-600 uppercase mb-0.5">Fat.</p><p className="text-base font-black text-emerald-800">{formatCurrency(abcData.fatA)}</p></div>
                                                            </div>
                                                        </div>
                                                        <div className="bg-blue-50 border border-blue-100 p-4 rounded-xl" title="Curva B: Representam a faixa intermediária (De 80% a 95% do Acumulado).">
                                                            <h3 className="text-blue-800 font-black text-sm cursor-help border-b border-dashed border-blue-300 w-fit pb-[1px]">Curva B (Próx. 15%)</h3>
                                                            <p className="text-blue-600 text-[9px] font-bold mt-1 leading-tight">Potencial de crescimento e up-sell.</p>
                                                            <div className="mt-2 flex justify-between items-end">
                                                                <div><p className="text-[8px] font-black text-blue-600 uppercase mb-0.5">Qtd.</p><p className="text-base font-black text-blue-800">{abcData.countB}</p></div>
                                                                <div className="text-right"><p className="text-[8px] font-black text-blue-600 uppercase mb-0.5">Fat.</p><p className="text-base font-black text-blue-800">{formatCurrency(abcData.fatB)}</p></div>
                                                            </div>
                                                        </div>
                                                        <div className="bg-white border border-slate-200 p-4 rounded-xl" title="Curva C: A 'Cauda Longa' (Últimos 5% do Acumulado).">
                                                            <h3 className="text-slate-700 font-black text-sm cursor-help border-b border-dashed border-slate-300 w-fit pb-[1px]">Curva C (Últ. 5%)</h3>
                                                            <p className="text-slate-500 text-[9px] font-bold mt-1 leading-tight">A "cauda longa". Maior custo operacional vs retorno.</p>
                                                            <div className="mt-2 flex justify-between items-end">
                                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-0.5">Qtd.</p><p className="text-base font-black text-slate-700">{abcData.countC}</p></div>
                                                                <div className="text-right"><p className="text-[8px] font-black text-slate-400 uppercase mb-0.5">Fat.</p><p className="text-base font-black text-slate-700">{formatCurrency(abcData.fatC)}</p></div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="bg-white p-4 rounded-xl border border-slate-200 mb-4">
                                                        <h4 className="text-[9px] font-black text-slate-500 uppercase tracking-wider mb-2 cursor-help border-b border-dashed border-slate-300 w-fit pb-[1px]" title="Representação visual do Princípio de Pareto.">Gráfico de Pareto (Visualização Top 50)</h4>
                                                        <div className="h-[200px] w-full">
                                                            <ResponsiveContainer width="100%" height="100%">
                                                                <ComposedChart data={abcData.list.slice(0, 50)} margin={{ top: 10, right: 10, left: 10, bottom: 0 }}>
                                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                                    <XAxis dataKey="name" hide />
                                                                    <YAxis yAxisId="left" tickFormatter={v => `${(v/1000000).toFixed(1)}M`} tick={{fontSize: 9, fontWeight: 600, fill: '#94a3b8'}} axisLine={false} tickLine={false} width={40} />
                                                                    <YAxis yAxisId="right" orientation="right" tickFormatter={v => `${v}%`} tick={{fontSize: 9, fontWeight: 600, fill: '#94a3b8'}} axisLine={false} tickLine={false} domain={[0, 100]} width={30} />
                                                                    <Tooltip content={<CustomAbcTooltip />} />
                                                                    <Bar yAxisId="left" dataKey="amount" radius={[3, 3, 0, 0]}>
                                                                        {abcData.list.slice(0, 50).map((entry, index) => (<Cell key={`cell-${index}`} fill={entry.curve === 'A' ? '#10b981' : entry.curve === 'B' ? '#3b82f6' : '#cbd5e1'} />))}
                                                                    </Bar>
                                                                    <Line yAxisId="right" type="monotone" dataKey="accPct" stroke="#f97316" strokeWidth={2.5} dot={false} activeDot={{ r: 5 }} />
                                                                </ComposedChart>
                                                            </ResponsiveContainer>
                                                        </div>
                                                    </div>

                                                    <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                                                        <table className="w-full text-left border-collapse">
                                                            <thead className="bg-slate-50 border-b border-slate-200">
                                                                <tr className="text-[9px] font-black text-slate-400 uppercase tracking-wider">
                                                                    <th className="px-5 py-4 text-center w-16">Rank</th><th className="px-5 py-4">{abcDimension === 'clientes' ? 'Cliente' : 'Produto'}</th><th className="px-5 py-4 text-right">Faturamento ({timeMode})</th><th className="px-5 py-4 text-right"><span className="cursor-help border-b border-dashed border-slate-300 pb-[1px]" title="Representatividade deste item sobre o Total.">% Repres.</span></th><th className="px-5 py-4 text-right"><span className="cursor-help border-b border-dashed border-slate-300 pb-[1px]" title="% acumulada com os itens acima no rank.">% Acumulada</span></th><th className="px-5 py-4 text-center w-24">Curva</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {filteredAbcListForTable.slice(0, 100).map((item, i) => (
                                                                    <tr key={item.rank} className={`border-b border-slate-50 hover:bg-slate-50 transition-colors ${i >= 10 ? 'hide-on-export' : ''}`}>
                                                                        <td className="px-5 py-3 text-xs font-bold text-slate-400 text-center">#{item.rank}</td>
                                                                        <td className="px-5 py-3 truncate max-w-[250px]" title={item.name}>
                                                                            <div className="text-xs font-bold text-slate-800">{item.name}</div>
                                                                            {abcDimension === 'clientes' && (
                                                                                <div className="flex items-center gap-1 mt-0.5 flex-wrap">
                                                                                    {item.customerType && item.customerType !== 'N/I' && item.customerType !== 'Não Informado' && (<span className="text-[8px] text-slate-400 font-semibold uppercase tracking-wider">{item.customerType}</span>)}
                                                                                    {item.city && item.city !== 'N/I' && (
                                                                                        <React.Fragment>
                                                                                            {item.customerType && item.customerType !== 'N/I' && item.customerType !== 'Não Informado' && (<span className="text-[8px] text-slate-300">•</span>)}
                                                                                            <span className="text-[8px] text-slate-500 font-semibold uppercase tracking-wider">{item.city} - {item.state}</span>
                                                                                        </React.Fragment>
                                                                                    )}
                                                                                </div>
                                                                            )}
                                                                        </td>
                                                                        <td className="px-5 py-3 text-xs font-bold text-slate-800 text-right">{formatCurrency(item.amount)}</td>
                                                                        <td className="px-5 py-3 text-xs font-bold text-slate-500 text-right">{item.pct.toFixed(2)}%</td>
                                                                        <td className="px-5 py-3 text-xs font-bold text-fuchsia-600 text-right">{item.accPct.toFixed(2)}%</td>
                                                                        <td className="px-5 py-3 text-center">
                                                                            <span className={`px-2.5 py-1 rounded text-[10px] font-black ${item.curve === 'A' ? 'bg-emerald-100 text-emerald-700' : (item.curve === 'B' ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-600')}`}>Curva {item.curve}</span>
                                                                        </td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                            <tfoot className="bg-slate-50">
                                                                <tr className="no-export"><td colSpan="6" className="py-3 px-5 text-center text-xs font-bold text-slate-500">A mostrar os primeiros {Math.min(100, filteredAbcListForTable.length)} de {filteredAbcListForTable.length.toLocaleString('pt-BR')} itens na tela. Utilize o botão Excel para baixar a lista completa.</td></tr>
                                                                <tr className="export-only"><td colSpan="6" className="py-2 px-5 text-center text-[10px] font-bold text-slate-400">Tabela de dados limitada ao Top 10 para o formato em PDF.</td></tr>
                                                            </tfoot>
                                                        </table>
                                                    </div>
                                                </div>
                                            );
                                        }

                                        if (modalConfig.type === 'capilaridade') {
                                            return (
                                                <div className="p-5 h-[300px] min-w-[600px] flex items-center justify-center">
                                                    <ResponsiveContainer width="100%" height="100%">
                                                        <LineChart data={chartDataCapilaridade} margin={{ top: 10, right: 20, left: -10, bottom: 0 }}>
                                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 9, fontWeight: 600, fill: '#94a3b8'}} />
                                                            <YAxis axisLine={false} tickLine={false} tick={{fontSize: 9, fontWeight: 600, fill: '#94a3b8'}} />
                                                            <Tooltip formatter={(v, name) => [`${Number(v || 0).toLocaleString('pt-BR')} PDVs`, isCompareUFModal ? name : `Período: ${name}`]} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgba(0,0,0,0.1)'}} />
                                                            <Legend verticalAlign="top" height={24} iconType="circle" wrapperStyle={{ fontSize: '9px', fontWeight: 'bold', color: '#64748b' }} />
                                                            <Line type="monotone" dataKey="Total" name="Total Agrupado" stroke="#0f172a" strokeWidth={3} dot={{ r: 3, strokeWidth: 2 }} activeDot={{ r: 5 }} connectNulls={false} />
                                                            {ufsToPlotCapilaridade.map((uf, i) => (<Line key={uf} type="monotone" dataKey={uf} name={uf} stroke={CHART_COLORS[i % CHART_COLORS.length]} strokeWidth={2} dot={{ r: 2, strokeWidth: 1 }} activeDot={{ r: 4 }} connectNulls={false} />))}
                                                        </LineChart>
                                                    </ResponsiveContainer>
                                                </div>
                                            );
                                        }

                                        if (['distribuidores', 'produtos', 'top'].includes(modalConfig.type) && detailedEntityData) {
                                            const d = detailedEntityData; const isFat = modalEvolucaoMode === 'faturamento';
                                            const mainVal = isFat ? formatCurrency(d.curTotal) : `${Number(d.curQtyTotal || 0).toLocaleString('pt-BR')} un`;
                                            const mainGrowth = isFat ? d.growth : d.growthQty;
                                            const secVal = isFat ? `${Number(d.curQtyTotal || 0).toLocaleString('pt-BR')} un` : formatCurrency(d.curTotal);
                                            const secGrowth = isFat ? d.growthQty : d.growth;

                                            let cards = [];
                                            if (modalConfig.type === 'produtos') {
                                                cards = [{ t1: isFat ? 'Receita Atual' : 'Volume Atual', v1: mainVal, g1: mainGrowth, badge: getRankBadge(d.rank) }, { t1: isFat ? 'Volume Atual' : 'Receita Atual', v1: secVal, g1: secGrowth }, { t1: 'Preço Médio vs Último', v1: `R$ ${Number(d.avgPrice || 0).toFixed(2)}`, sub: `Último praticado a: R$ ${Number(d.lastPrice || 0).toFixed(2)}` }];
                                            } else if (modalConfig.type === 'top') {
                                                cards = [{ t1: isFat ? 'Fat. Atual' : 'Volume Atual', v1: mainVal, g1: mainGrowth, badge: getRankBadge(d.rank) }, { t1: isFat ? 'Volume Atual' : 'Fat. Atual', v1: secVal, g1: secGrowth }, { t1: 'Média Mensal', v1: isFat ? formatCurrency(d.curTotal / (yearComparison?.curSpan || 12)) : `${Math.round(d.curQtyTotal / (yearComparison?.curSpan || 12)).toLocaleString('pt-BR')} un`, sub: `/ ${yearComparison?.curSpan || 12} meses` }];
                                            } else {
                                                cards = [{ t1: isFat ? 'Fat. Atual' : 'Volume Atual', v1: mainVal, g1: mainGrowth, badge: getRankBadge(d.rank) }, { t1: 'Capilaridade', v1: `${Number(d.capilaridade || 0).toLocaleString('pt-BR')} PDVs`, sub: 'Neste ciclo' }, { t1: 'Média / PDV', v1: d.capilaridade > 0 ? (isFat ? formatCurrency(d.curTotal / d.capilaridade) : `${(d.curQtyTotal / d.capilaridade).toFixed(1)} un`) : (isFat ? 'R$ 0,00' : '0 un'), sub: 'Ticket Médio / Volume Médio' }];
                                            }

                                            const chart2Data = modalConfig.type === 'produtos' ? (isFat ? d.topDistributorsFat : d.topDistribuidoresQty) : (isFat ? d.topProductsFat : d.topProductsQty);
                                            const chart2Title = modalConfig.type === 'produtos' ? `Top Distribuidores ${modalProductFilter === 'TODOS' ? '(Geral)' : 'deste Produto'}` : 'Produtos Preferidos (Top 5)';
                                            const showClientRank = modalConfig.type === 'top' && modalClientFilter === 'TODOS';
                                            const showDistTable = modalConfig.type === 'top' && modalClientFilter !== 'TODOS';

                                            return (
                                                <div className="p-5">
                                                    <div className="grid grid-cols-3 gap-2 mb-4">
                                                        {cards.map((c, i) => (
                                                            <div key={i} className="bg-white p-3 rounded-lg border border-slate-200 relative">
                                                                <div className="flex justify-between items-start"><p className="text-[8px] font-black text-slate-400 uppercase mb-0.5">{c.t1}</p>{c.badge}</div>
                                                                <h3 className={`text-base font-black mt-0.5 ${isFat ? (modalConfig.type==='top' ? 'text-fuchsia-600' : (modalConfig.type==='produtos' ? 'text-slate-800' : 'text-emerald-600')) : 'text-blue-600'}`}>{c.v1}</h3>
                                                                {c.g1 !== undefined ? (<div className="mt-1 flex items-center gap-1 text-[8px] font-bold">{c.g1 !== null ? <span className={c.g1 >= 0 ? 'text-emerald-500' : 'text-rose-500'}>{c.g1 >= 0 ? '+' : ''}{(c.g1 || 0).toFixed(1)}% vs Ant.</span> : <span className="text-slate-400">Sem histórico</span>}</div>) : <p className="text-[8px] text-slate-400 font-bold mt-1">{c.sub}</p>}
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-2 mb-4">
                                                        <div className="bg-white p-4 rounded-lg border border-slate-200">
                                                            <div className="flex justify-between items-center mb-2">
                                                                <h4 className="text-[9px] font-black text-slate-500 uppercase tracking-wider">Evolução Mensal</h4>
                                                                <div className="flex bg-slate-100 p-0.5 rounded-md no-export">
                                                                    <button onClick={() => setModalEvolucaoMode('faturamento')} className={`px-1.5 py-0.5 text-[8px] font-bold rounded transition-colors ${isFat ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>R$ Fat.</button>
                                                                    <button onClick={() => setModalEvolucaoMode('quantidade')} className={`px-1.5 py-0.5 text-[8px] font-bold rounded transition-colors ${!isFat ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>Unidades</button>
                                                                </div>
                                                            </div>
                                                            <div className="h-40 w-full">
                                                                <ResponsiveContainer width="100%" height="100%">
                                                                    <LineChart data={d.monthlyTrend}>
                                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 8, fontWeight: 600, fill: '#94a3b8'}} />
                                                                        <YAxis axisLine={false} tickLine={false} tick={{fontSize: 8, fontWeight: 600, fill: '#94a3b8'}} tickFormatter={v => isFat ? formatShortNumber(v) : (v>=1000 ? (Number(v)/1000).toFixed(1)+'k' : v)} width={35} />
                                                                        <Tooltip formatter={(v) => [isFat ? formatCurrency(v) : `${Number(v).toLocaleString('pt-BR')} un`, isFat ? 'Faturamento' : 'Quantidade']} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgba(0,0,0,0.1)', fontSize: '9px', fontWeight: 'bold'}} />
                                                                        <Line type="monotone" dataKey={isFat ? 'valor' : 'qty'} stroke={modalConfig.type==='top' ? "#f59e0b" : (modalConfig.type==='produtos' ? "#3b82f6" : "#10b981")} strokeWidth={2} dot={{r: 2, fill: modalConfig.type==='top' ? "#f59e0b" : (modalConfig.type==='produtos' ? "#3b82f6" : "#10b981"), strokeWidth: 1.5, stroke: '#fff'}} />
                                                                    </LineChart>
                                                                </ResponsiveContainer>
                                                            </div>
                                                        </div>
                                                        <div className="bg-white p-4 rounded-lg border border-slate-200">
                                                            <div className="flex justify-between items-center mb-2"><h4 className="text-[9px] font-black text-slate-500 uppercase tracking-wider">{chart2Title}</h4></div>

                                                                        <XAxis type="number" hide />

                            </div>
                            <div className="flex items-center gap-1 bg-slate-100 p-0.5 rounded-md border border-slate-200">
                                <button onClick={() => setTimeMode('U6M')} className={`px-2.5 py-1 text-[8px] uppercase tracking-wider font-black rounded transition-all ${timeMode === 'U6M' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>U6M (6 Meses)</button>
                                <button onClick={() => setTimeMode('UDM')} className={`px-2.5 py-1 text-[8px] uppercase tracking-wider font-black rounded transition-all ${timeMode === 'UDM' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>UDM (12 Meses)</button>
                                <button onClick={() => setTimeMode('YTD')} className={`px-2.5 py-1 text-[8px] uppercase tracking-wider font-black rounded transition-all ${timeMode === 'YTD' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>YTD (Acumulado)</button>
                            </div>
                            <div className="flex items-center gap-1.5">
                                {lastUpdate && <div className="text-[9px] font-bold text-slate-500 bg-slate-50 border border-slate-100 px-2 py-1 rounded flex items-center gap-1"><Clock size={10} className="text-slate-400" /> Atualizado: <span className="text-slate-700">{lastUpdate}</span></div>}
                                <button onClick={() => openModal('manual')} className="flex items-center gap-1 bg-blue-50 text-blue-700 border border-blue-200 px-2.5 py-1 rounded text-[9px] font-bold hover:bg-blue-100 transition-colors no-export"><BookOpen size={10}/> Manual</button>
                                <button onClick={() => exportToPDF('Visao_Global_Dashboard', 'main-dashboard-export-area')} disabled={isExportingPDF} className="flex items-center gap-1 bg-slate-900 text-white px-2.5 py-1 rounded text-[9px] font-bold hover:bg-black transition-colors no-export disabled:opacity-50">
                                    {isExportingPDF ? <Loader2 size={10} className="animate-spin" /> : <Download size={10}/>}
                                    {isExportingPDF ? 'A Gerar...' : 'Exportar Tela'}
                                </button>
                                <button onClick={() => openModal('abc')} className="flex items-center gap-1 bg-indigo-50 text-indigo-700 border border-indigo-200 px-2.5 py-1 rounded text-[9px] font-bold hover:bg-indigo-100 transition-colors"><Target size={10}/> Curva ABC</button>
                                <button onClick={() => openModal('analitico')} className="flex items-center gap-1 bg-emerald-50 text-emerald-700 border border-emerald-200 px-2.5 py-1 rounded text-[9px] font-bold hover:bg-emerald-100 transition-colors"><List size={10}/> Visão Analítica</button>
                                <button onClick={() => { setShowUploadScreen(true); setIsLoaded(false); }} className="flex items-center gap-1 bg-slate-900 text-white px-2.5 py-1 rounded text-[9px] font-bold hover:bg-black transition-colors"><Upload size={10}/> Arquivo</button>
                                <button onClick={() => { setShowUploadScreen(true); setIsLoaded(false); setCurrentUser(null); setPasswordValue(''); setIsAdminVerified(false); }} className="flex items-center gap-1 bg-rose-50 text-rose-700 border border-rose-200 px-2.5 py-1 rounded text-[9px] font-bold hover:bg-rose-100 transition-colors"><UserMinus size={10}/> Sair</button>
                            </div>
                        </div>

                        <div className="bg-white p-2 rounded-lg border border-slate-200 shadow-sm flex flex-wrap gap-1.5 items-end">
                            <div className="flex-1 min-w-[120px]"><DebouncedInput value={filters.searchCustomer} onChange={v => setFilters({...filters, searchCustomer: v})} placeholder="Nome/CNPJ..." icon="Search" /></div>
                            <div className="flex-1 min-w-[120px]"><DebouncedInput value={filters.searchProduct} onChange={v => setFilters({...filters, searchProduct: v})} placeholder="Produto..." icon="Package" /></div>
                            <CustomMultiSelect label="Anos" options={options.years} selected={filters.years} onChange={v => setFilters({...filters, years: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Meses" options={options.months} selected={filters.months} onChange={v => setFilters({...filters, months: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Estado" options={options.states} selected={filters.state} onChange={v => setFilters({...filters, state: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Cidade" options={options.cities} selected={filters.city} onChange={v => setFilters({...filters, city: v})} placeholder="Todas" searchable={true} />
                            <CustomMultiSelect label="Distribuidor" options={options.distributors} selected={filters.distributor} onChange={v => setFilters({...filters, distributor: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Tipo Cliente" options={options.customerTypes} selected={filters.customerType} onChange={v => setFilters({...filters, customerType: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Unidade" options={options.units} selected={filters.type} onChange={v => setFilters({...filters, type: v})} placeholder="Todas" searchable={true} />
                        </div>

                        <div className="grid grid-cols-2 lg:grid-cols-6 gap-1.5">
                            {[
                                { t: 'Faturamento', m: 'fatCur', g: 'fatGrowth', icon: TrendingUp, color: 'slate', onClick: null },
                                { t: 'Preço Médio', m: 'precoMedioCur', g: 'precoMedioGrowth', icon: Package, color: 'blue', isCurrency: true, onClick: () => openModal('preco') },
                                { t: 'Capilaridade', m: 'capCur', g: 'capGrowth', icon: TrendingUp, color: 'slate', isNumber: true, onClick: () => openModal('capilaridade') },
                                { t: 'Clientes Novos', m: 'novosMain', sub: 'fatNovosMain', icon: UserPlus, color: 'emerald', isNumber: true, onClick: () => openModal('novos') },
                                { t: 'Em Alerta', m: 'alertaMain', subLabel: 'Risco de Churn', icon: Bell, color: 'amber', isNumber: true, onClick: () => openModal('alerta') },
                                { t: 'Clientes Perdidos', m: 'perdidosMain', sub: 'fatPerdidosMain', icon: UserMinus, color: 'rose', isNumber: true, onClick: () => openModal('perdidos') }
                            ].map((kpi, i) => {
                                const KpiIcon = kpi.icon;
                                return (
                                <div key={i} onClick={kpi.onClick} className={`bg-${kpi.color === 'slate' ? 'white' : kpi.color + '-50'} hover:bg-${kpi.color === 'slate' ? 'slate-50' : kpi.color + '-100'} p-3 rounded-lg border border-${kpi.color === 'slate' ? 'slate-200' : kpi.color + '-200'} shadow-sm flex flex-col justify-between ${kpi.onClick ? 'cursor-pointer group' : ''}`}>
                                    <div>
                                        <div className="flex justify-between items-start mb-0.5">
                                            <p className={`text-${kpi.color === 'slate' ? 'slate-400' : kpi.color + '-600/70'} text-[8px] font-black uppercase ${kpi.onClick ? 'cursor-help border-b border-dashed border-'+kpi.color+'-400' : ''} w-fit`}>{kpi.t} {kpi.g ? `(${timeMode})` : ''}</p>
                                            <KpiIcon size={10} className={`text-${kpi.color === 'slate' ? 'slate-300' : kpi.color + '-400'} ${kpi.onClick ? 'group-hover:text-'+(kpi.color==='slate'?'blue':kpi.color)+'-600' : ''}`} />
                                        </div>
                                        <h3 className={`text-lg font-black text-${kpi.color === 'slate' ? 'slate-800' : kpi.color + '-700'}`}>
                                            {kpi.isCurrency ? `R$ ${(metrics[kpi.m] || 0).toFixed(2)}` : kpi.isNumber ? (metrics[kpi.m] || 0).toLocaleString('pt-BR') : formatCurrency(metrics[kpi.m] || 0)}
                                        </h3>
                                        {kpi.sub && <p className={`text-${kpi.color}-600 text-[8px] font-bold`}>{formatCurrency(metrics[kpi.sub])}</p>}
                                        {kpi.subLabel && <p className={`text-${kpi.color}-600 text-[8px] font-bold`}>{kpi.subLabel}</p>}
                                    </div>
                                    {kpi.g ? (
                                        <div className="flex flex-col gap-0.5 mt-auto">
                                            <GrowthBadge growth={metrics[kpi.g]} curLabel={yearComparison?.curLabel} prevLabel={yearComparison?.prevLabel} timeMode={timeMode} />
                                            {kpi.onClick && <div className={`mt-1 flex items-center gap-1 text-[8px] font-bold w-fit px-1.5 py-0.5 rounded bg-${kpi.color === 'slate' ? 'slate-50' : 'white'} text-${kpi.color === 'slate' ? 'slate-500' : kpi.color + '-500'} group-hover:bg-${kpi.color === 'slate' ? 'blue-100' : kpi.color + '-600'} group-hover:text-${kpi.color === 'slate' ? 'blue-600' : 'white'} border border-slate-200 transition-colors`}>{kpi.t === 'Preço Médio' ? 'Ver Tabela' : 'Evolução'}</div>}
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-0.5 mt-auto">
                                            <div className={`mt-1 flex items-center gap-1 text-[8px] font-bold w-fit px-1.5 py-0.5 rounded bg-${kpi.color}-200/50 text-${kpi.color}-700 group-hover:bg-${kpi.color}-600 group-hover:text-white transition-colors`}>Detalhar {timeMode}</div>
                                        </div>
                                    )}
                                </div>
                            )})}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-1.5 mt-1.5">
                            <div className="lg:col-span-2 bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 flex items-center gap-1.5"><TrendingUp size={12} className="text-blue-600" /> Evolução Mensal</h3>
                                    <div className="flex bg-slate-100 p-0.5 rounded">
                                        <button onClick={() => setEvolucaoMode('faturamento')} className={`px-2 py-0.5 text-[8px] font-bold rounded ${evolucaoMode === 'faturamento' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>R$ Fat.</button>
                                        <button onClick={() => setEvolucaoMode('quantidade')} className={`px-2 py-0.5 text-[8px] font-bold rounded ${evolucaoMode === 'quantidade' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>Qtd.</button>
                                    </div>
                                </div>
                                <div className="h-[200px] w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={evolucaoChartState.data} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 600, fill: '#94a3b8'}} />
                                            <YAxis axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 600, fill: '#94a3b8'}} tickFormatter={v => evolucaoMode === 'faturamento' ? `${(Number(v)/1000000).toFixed(1)}M` : (v>=1000 ? (Number(v)/1000).toFixed(1)+'k' : v)} />
                                            <Tooltip formatter={(v, name) => [evolucaoMode === 'faturamento' ? formatCurrency(v) : `${Number(v || 0).toLocaleString('pt-BR')} un`, `Ano ${name}`]} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px rgba(0,0,0,0.1)'}} />
                                            <Legend verticalAlign="top" height={24} iconType="circle" wrapperStyle={{ fontSize: '10px', fontWeight: 'bold', color: '#64748b' }} />
                                            {mediaEvolucao !== null && <ReferenceLine y={mediaEvolucao} stroke="#94a3b8" strokeDasharray="4 4" label={{ position: 'top', value: `Média: ${evolucaoMode === 'faturamento' ? formatCurrency(mediaEvolucao) : (mediaEvolucao>=1000 ? (Number(mediaEvolucao)/1000).toFixed(1)+'k' : Number(mediaEvolucao).toFixed(0))}`, fill: '#64748b', fontSize: 9, fontWeight: 'bold' }} />}
                                            {evolucaoChartState.lines.map((y, i) => <Line key={y} type="monotone" dataKey={y} name={y.toString()} stroke={CHART_COLORS[i % CHART_COLORS.length]} strokeWidth={2.5} dot={{r: 3, strokeWidth: 1.5}} activeDot={{r: 5}} connectNulls={false} />)}
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                            <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col">
                                <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 flex items-center gap-1.5 mb-2"><List size={12} className="text-blue-600" /> Representatividade ({timeMode})</h3>
                                <div className="flex flex-wrap gap-1 mb-2 bg-slate-100 p-0.5 rounded w-fit">
                                    {['UF', 'Cidade', 'Tipo Cliente', 'Unidade', 'Distribuidor'].map(metric => (<button key={metric} onClick={() => setPieChartMetric(metric)} className={`px-2 py-0.5 text-[8px] font-bold rounded transition-all ${pieChartMetric === metric ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>{metric}</button>))}
                                </div>
                                <div className="h-[180px] w-full flex-1">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={pieChartData} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={35} outerRadius={55} paddingAngle={2} label={({ name, percent }) => `${String(name).substring(0,8)}${String(name).length > 8 ? '...' : ''} ${(Number(percent) * 100).toFixed(1)}%`} labelLine={true} labelStyle={{fontSize: '8px', fontWeight: 'bold', fill: '#64748b'}}>
                                                {pieChartData.map((e, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                                            </Pie>
                                            <Tooltip content={<CustomUFTooltip />} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-1.5 mt-1.5 mb-4">
                            {[
                                { title: 'Top Produtos', data: topProducts, icon: Package, color: 'text-blue-600', fill: '#3b82f6', formatter: renderBarLabel(false, '#3b82f6') },
                                { title: 'Top Distribuidores', data: topDistribuidores, icon: Truck, color: 'text-emerald-500', fill: '#10b981', formatter: renderBarLabel(true, '#10b981') },
                                { title: 'Top Clientes', data: topClients, icon: Users, color: 'text-fuchsia-500', fill: '#f59e0b', formatter: renderBarLabel(true, '#f59e0b') }
                            ].map((rank) => {
                                const RankIcon = rank.icon;
                                return (
                                <div key={rank.title} className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col group">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 flex items-center gap-1.5"><RankIcon size={12} className={rank.color} /> {rank.title} ({timeMode})</h3>
                                        <button onClick={() => openModal(rank.title === 'Top Produtos' ? 'produtos' : rank.title === 'Top Distribuidores' ? 'distribuidores' : 'top')} className={`text-[8px] font-bold ${rank.color} bg-slate-50 px-1.5 py-0.5 rounded border border-slate-200 flex items-center gap-1 hover:bg-slate-100 transition-colors`}><List size={8} /> Raio-X</button>
                                    </div>
                                    <div className="h-[220px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={rank.data} layout="vertical" margin={{ top: 0, right: 40, left: 10, bottom: 0 }}>
                                                <XAxis type="number" hide={true} />
                                                <YAxis dataKey="name" type="category" width={110} axisLine={false} tickLine={false} tickFormatter={formatYAxisTick} tick={{fontSize: 8, fontWeight: 700, fill: '#64748b'}} />
                                                <Tooltip content={(props) => <CustomYoyTooltip {...props} yearComparison={yearComparison} isProduct={rank.title === 'Top Produtos'} />} cursor={{fill: '#f8fafc'}} />
                                                <Legend verticalAlign="top" height={20} iconType="circle" wrapperStyle={{ fontSize: '8px', fontWeight: 'bold', color: '#64748b' }} />
                                                <Bar dataKey={rank.title === 'Top Produtos' ? 'qtyCur' : 'curVal'} name="Atual" fill={rank.fill} radius={[0, 3, 3, 0]} barSize={6} label={rank.formatter} />
                                                <Bar dataKey={rank.title === 'Top Produtos' ? 'qtyComp' : 'compVal'} name="Anterior" fill="#cbd5e1" radius={[0, 3, 3, 0]} barSize={6} />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            )})}
                        </div>
                        
                        {/* RODAPÉ DESENVOLVEDOR */}
                        {isLoaded && !showUploadScreen && (
                            <div className="text-center mt-2 pb-6 no-export">
                                <p className="text-[10px] text-slate-400 font-semibold tracking-wider">
                                    DESENVOLVIDO POR: <a href="mailto:george.gos@gmail.com" className="text-blue-500 hover:text-blue-700 font-black hover:underline transition-colors ml-1">GEORGE SILVA</a>
                                </p>
                            </div>
                        )}
                        
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
