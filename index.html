                            {label:'UF', align:'text-center', val:r=><span className="bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded text-[8px] font-bold">{String(r.state)}</span>}, 
                            {label:'Cidade', val:r=><span className="text-[8px] text-slate-600 font-semibold truncate max-w-[80px]">{String(r.city)}</span>}
                        ] : []),
                        {label:'Faturamento', align:'text-right', val:r=><span className="font-bold text-slate-800">{formatCurrency(r.amount)}</span>}, 
                        {label:'% Repres.', align:'text-right', val:r=><span className="text-slate-500 font-bold">{Number(r.pct || 0).toFixed(2) + "%"}</span>}, 
                        {label:'% Acumulada', align:'text-right', val:r=><span className="text-fuchsia-600 font-bold">{Number(r.accPct || 0).toFixed(2) + "%"}</span>}, 
                        {label:'Curva', align:'text-center', val:r=><span className={`px-2 py-0.5 rounded text-[8px] font-black ${r.curve==='A'?'bg-emerald-100 text-emerald-700':r.curve==='B'?'bg-blue-100 text-blue-700':'bg-slate-200 text-slate-600'}`}>Curva {String(r.curve)}</span>} 
                    ];
                    return (
                        <div className="p-3 lg:p-4 space-y-3">
                            <div className="flex justify-center gap-2 mb-1 no-export">
                                 <button onClick={() => { setAbcDimension('clientes'); setModalAbcFilter('TODOS'); }} className={`px-3 py-2 rounded-lg font-black text-[10px] shadow-sm transition-all ${abcDimension === 'clientes' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}`}>Análise por Clientes</button>
                                 <button onClick={() => { setAbcDimension('produtos'); setModalAbcFilter('TODOS'); }} className={`px-3 py-2 rounded-lg font-black text-[10px] shadow-sm transition-all ${abcDimension === 'produtos' ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}`}>Análise por Produtos</button>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-2">
                                <div className="bg-emerald-50 border border-emerald-100 p-4 rounded-xl shadow-sm"><h3 className="text-emerald-800 font-black text-[10px] border-b border-dashed border-emerald-300 w-fit pb-[1px]">Curva A (Top 80%)</h3><div className="mt-2 flex justify-between items-end"><div><p className="text-[8px] font-black text-emerald-600 uppercase mb-0.5">Qtd.</p><p className="text-lg font-black text-emerald-800">{Number(abcDataRaw.countA)}</p></div><div className="text-right"><p className="text-[8px] font-black text-emerald-600 uppercase mb-0.5">Fat.</p><p className="text-lg font-black text-emerald-800">{formatCurrency(abcDataRaw.fatA)}</p></div></div></div>
                                <div className="bg-blue-50 border border-blue-100 p-4 rounded-xl shadow-sm"><h3 className="text-blue-800 font-black text-[10px] border-b border-dashed border-blue-300 w-fit pb-[1px]">Curva B (Próx. 15%)</h3><div className="mt-2 flex justify-between items-end"><div><p className="text-[8px] font-black text-blue-600 uppercase mb-0.5">Qtd.</p><p className="text-lg font-black text-blue-800">{Number(abcDataRaw.countB)}</p></div><div className="text-right"><p className="text-[8px] font-black text-blue-600 uppercase mb-0.5">Fat.</p><p className="text-lg font-black text-blue-800">{formatCurrency(abcDataRaw.fatB)}</p></div></div></div>
                                <div className="bg-white border border-slate-200 p-4 rounded-xl shadow-sm"><h3 className="text-slate-700 font-black text-[10px] border-b border-dashed border-slate-300 w-fit pb-[1px]">Curva C (Últ. 5%)</h3><div className="mt-2 flex justify-between items-end"><div><p className="text-[8px] font-black text-slate-400 uppercase mb-0.5">Qtd.</p><p className="text-lg font-black text-slate-700">{Number(abcDataRaw.countC)}</p></div><div className="text-right"><p className="text-[8px] font-black text-slate-400 uppercase mb-0.5">Fat.</p><p className="text-lg font-black text-slate-700">{formatCurrency(abcDataRaw.fatC)}</p></div></div></div>
                            </div>
                            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-3">
                                <h4 className="text-[9px] font-black text-slate-500 uppercase tracking-wider mb-3">Gráfico de Pareto (Top 50)</h4>
                                <div className="h-[220px] w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <ComposedChart data={abcDataRaw.list.slice(0, 50)} margin={{ top: 10, right: 10, left: 10, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="name" hide />
                                            <YAxis yAxisId="left" tickFormatter={v=>`${(v/1000000).toFixed(1)}M`} tick={{fontSize: 9, fontWeight: 600, fill: '#94a3b8'}} axisLine={false} tickLine={false} width={35} />
                                            <YAxis yAxisId="right" orientation="right" tickFormatter={v=>`${v}%`} tick={{fontSize: 9, fontWeight: 600, fill: '#94a3b8'}} axisLine={false} tickLine={false} domain={[0, 100]} width={25} />
                                            <Tooltip content={<CustomAbcTooltip />} />
                                            <Bar yAxisId="left" dataKey="amount" radius={[3, 3, 0, 0]} isAnimationActive={false}>
                                                {abcDataRaw.list.slice(0, 50).map((e, i) => <Cell key={"cell-" + i} fill={e.curve === 'A' ? '#10b981' : e.curve === 'B' ? '#3b82f6' : '#cbd5e1'} />)}
                                            </Bar>
                                            <Line yAxisId="right" type="monotone" dataKey="accPct" stroke="#f97316" strokeWidth={2} dot={false} activeDot={{ r: 4 }} isAnimationActive={false} />
                                        </ComposedChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                            <DataTable cols={colsABC} data={filteredAbcList} />
                        </div>
                    );
                }

                if (modalConfig.type === 'matriz') {
                    const colsMatriz = [ 
                        {label:'Rank', align:'text-center', val:r=><span className="text-slate-400 font-bold">{"#" + String(r.rank||'-')}</span>}, 
                        {label:'Nome', sort:()=>setMatrizSortConfig(p=>({column:'name',direction:p.column==='name'&&p.direction==='desc'?'asc':'desc'})), activeSort:matrizSortConfig.column==='name', sortDir:matrizSortConfig.direction, val:r=><div className="text-slate-800 font-bold truncate max-w-[250px]">{String(r.name)}</div>}, 
                        {label:'Fat. Atual', align:'text-right', sort:()=>setMatrizSortConfig(p=>({column:'fatCur',direction:p.column==='fatCur'&&p.direction==='desc'?'asc':'desc'})), activeSort:matrizSortConfig.column==='fatCur', sortDir:matrizSortConfig.direction, val:r=><span className="font-bold text-slate-800">{formatCurrency(r.fatCur)}</span>}, 
                        {label:'Crescimento', align:'text-right', sort:()=>setMatrizSortConfig(p=>({column:'growth',direction:p.column==='growth'&&p.direction==='desc'?'asc':'desc'})), activeSort:matrizSortConfig.column==='growth', sortDir:matrizSortConfig.direction, val:r=><span className={`px-2 py-0.5 rounded text-[8px] font-bold ${r.growth>=0?'bg-emerald-50 text-emerald-600':'bg-rose-50 text-rose-600'}`}>{r.growth>0?'+':''}{Number(r.growth || 0).toFixed(1) + "%"}</span>}, 
                        {label:'Quadrante', align:'text-center', sort:()=>setMatrizSortConfig(p=>({column:'quadrant',direction:p.column==='quadrant'&&p.direction==='desc'?'asc':'desc'})), activeSort:matrizSortConfig.column==='quadrant', sortDir:matrizSortConfig.direction, val:r=><span className={`px-2 py-0.5 rounded text-[8px] font-black ${String(r.bg)} ${String(r.color)}`}>{String(r.quadrant)}</span>} 
                    ];
                    const mS = { 
                        E: { l: 'Estrelas', c: 0, f: 0, col: 'text-emerald-600', bg: 'bg-emerald-50', bd: 'border-emerald-200' }, 
                        V: { l: 'Vacas Leiteiras', c: 0, f: 0, col: 'text-blue-600', bg: 'bg-blue-50', bd: 'border-blue-200' }, 
                        Ap: { l: 'Apostas', c: 0, f: 0, col: 'text-amber-600', bg: 'bg-amber-50', bd: 'border-amber-200' }, 
                        Ab: { l: 'Abacaxis', c: 0, f: 0, col: 'text-rose-600', bg: 'bg-rose-50', bd: 'border-rose-200' } 
                    };
                    let totalFat = 0; 
                    scatterPlotData.filtered.forEach(d => { 
                        let k = ''; 
                        if(d.quadrant === 'Estrela') k='E'; else if(d.quadrant === 'Vaca Leiteira') k='V'; else if(d.quadrant === 'Aposta') k='Ap'; else k='Ab'; 
                        mS[k].c++; mS[k].f += d.fatCur; totalFat += d.fatCur; 
                    });
                    
                    return (
                        <div className="p-3 lg:p-4 space-y-3">
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-2">
                                {Object.values(mS).map((s, i) => (
                                    <div key={i} className={`${String(s.bg)} p-4 rounded-xl border ${String(s.bd)} shadow-sm`}>
                                        <h3 className={`text-[8px] font-black uppercase ${String(s.col)}`}>{String(s.l)}</h3>
                                        <div className="mt-2 flex justify-between items-end">
                                            <div><p className={`text-[8px] font-black opacity-70 ${String(s.col)}`}>TOTAL</p><p className={`text-lg font-black ${String(s.col)}`}>{Number(s.c)}</p></div>
                                            <div className="text-right"><p className={`text-[8px] font-black opacity-70 ${String(s.col)}`}>FAT.</p><p className={`text-sm font-black ${String(s.col)}`}>{formatShortNum(s.f)}</p></div>
                                        </div>
                                        <p className={`text-[8px] font-bold mt-1.5 opacity-80 ${String(s.col)}`}>{(totalFat > 0 ? (s.f/totalFat)*100 : 0).toFixed(1)}% da matriz</p>
                                    </div>
                                ))}
                            </div>
                            <DataTable cols={colsMatriz} data={scatterPlotData.filtered.slice(0, 200)} footer={<tr><td colSpan="5" className="py-4 text-center text-[10px] font-bold text-slate-500">Exibindo os primeiros {Math.min(200, scatterPlotData.filtered.length)} itens na tela.</td></tr>} />
                        </div>
                    );
                }

                if (modalConfig.type === 'analitico') {
                    const totalAnaliticoQtd = modalDataFiltered.reduce((a,d) => a + (Number(d._qty) || 0), 0);
                    const totalAnaliticoFat = modalDataFiltered.reduce((a,d) => a + (Number(d._amount) || 0), 0);
                    const precoMedioAnalitico = totalAnaliticoQtd > 0 ? totalAnaliticoFat / totalAnaliticoQtd : 0;
                    
                    const colsAn = [ 
                        {label:'DATA', val:r=><span className="font-bold text-slate-800">{String(r._displayDate)}</span>, sort:()=>setAnaliticoSortConfig(p=>({column:'data',direction:p.column==='data'&&p.direction==='desc'?'asc':'desc'})), activeSort:analiticoSortConfig.column==='data', sortDir:analiticoSortConfig.direction}, 
                        {label:'CNPJ', val:r=><span className="text-slate-500">{String(r.cnpj)}</span>}, 
                        {label:'CLIENTE', val:r=><div><div className="font-bold text-slate-800 truncate max-w-[150px]">{String(r._customer)}</div>{r._customerType !== 'N/I' && <div className="text-[7px] text-slate-400 font-bold uppercase mt-0.5">{String(r._customerType)}</div>}</div>}, 
                        {label:'UF', align:'text-center', val:r=><span className="bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded text-[8px] font-bold">{String(r._state)}</span>}, 
                        {label:'CIDADE', val:r=><span className="font-semibold text-slate-600 uppercase">{String(r._city)}</span>}, 
                        {label:'DISTRIBUIDOR', val:r=><span className="font-bold text-slate-600">{String(r._distributor)}</span>}, 
                        {label:'PRODUTO', val:r=><div className="font-bold text-slate-700 truncate max-w-[150px]">{String(r._product)}</div>}, 
                        {label:'QTD', align:'text-right', val:r=><span className="font-bold text-slate-800">{Number(r._qty)}</span>}, 
                        {label:'FATURAMENTO', align:'text-right', val:r=><span className="font-bold text-slate-800">{formatCurrency(r._amount)}</span>, sort:()=>setAnaliticoSortConfig(p=>({column:'faturamento',direction:p.column==='faturamento'&&p.direction==='desc'?'asc':'desc'})), activeSort:analiticoSortConfig.column==='faturamento', sortDir:analiticoSortConfig.direction}, 
                        {label:'PREÇO UNIT.', align:'text-right', val:r=><span className="font-bold text-blue-600">{r._qty>0?formatCurrency(r._amount/r._qty):'-'}</span>} 
                    ];
                    return (
                        <div className="p-3 lg:p-4">
                            <DataTable cols={colsAn} data={modalDataFiltered.slice(0, 500)} footer={
                                <tr className="text-[9px] font-black text-slate-800 uppercase tracking-wider border-t border-slate-200">
                                    <td colSpan="7" className="py-3 px-4 text-right">TOTAL SELEÇÃO:</td>
                                    <td className="py-3 px-4 text-right">{totalAnaliticoQtd.toLocaleString('pt-BR')} un</td>
                                    <td className="py-3 px-4 text-right text-emerald-600">{formatCurrency(totalAnaliticoFat)}</td>
                                    <td className="py-3 px-4 text-right text-blue-600">{formatCurrency(precoMedioAnalitico)}</td>
                                </tr>
                            } />
                        </div>
                    );
                }

                if (modalConfig.type === 'preco') {
                    const colsPr = [ 
                        {label:'Produto', val:r=><div className="font-bold text-slate-800 truncate max-w-[200px]">{String(r.name)}</div>}, 
                        {label:'Qtd. Vendida', align:'text-right', val:r=><span className="font-bold text-slate-800">{Number(r.qty).toLocaleString('pt-BR')} un</span>}, 
                        {label:'Menor Preço', align:'text-right', val:r=><div><div className="text-emerald-600 font-black">{formatCurrency(r.min)}</div><div className="text-[8px] text-slate-400">em {String(r.minDate || '-')}</div></div>}, 
                        {label:'Preço Médio', align:'text-right', val:r=><span className="text-blue-700 font-black bg-blue-50/50 px-2 py-0.5 rounded">{formatCurrency(r.avg)}</span>}, 
                        {label:'Último Preço', align:'text-right', val:r=><div><div className="text-slate-800 font-black">{formatCurrency(r.lastPrice)}</div><div className="text-[8px] text-slate-400">em {String(r.lastDateLabel || '-')}</div></div>} 
                    ];
                    return <div className="p-3 lg:p-4"><DataTable cols={colsPr} data={modalPrecosData} /></div>;
                }

                if (modalConfig.type === 'capilaridade') {
                    return (
                        <div className="p-4 h-[350px] min-w-[500px]">
                            <ResponsiveContainer width="100%" height="100%">
                                <LineChart data={chartDataCapilaridade} margin={{top:10, right:20, left:-10, bottom:0}}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize:9, fontWeight:600, fill:'#94a3b8'}} />
                                    <YAxis axisLine={false} tickLine={false} tick={{fontSize:9, fontWeight:600, fill:'#94a3b8'}} />
                                    <Tooltip formatter={(v, n) => [Number(v||0).toLocaleString('pt-BR') + " PDVs", isCompareUFModal ? String(n) : "Período: " + String(n)]} contentStyle={{borderRadius:'8px', border:'none', boxShadow:'0 4px 6px -1px rgba(0,0,0,0.1)'}} />
                                    <Legend verticalAlign="top" height={24} iconType="circle" wrapperStyle={{fontSize:'9px', fontWeight:'bold', color:'#64748b'}} />
                                    <Line type="monotone" dataKey="Total" name="Total Agrupado" stroke="#0f172a" strokeWidth={3} dot={{r:3, strokeWidth:2}} activeDot={{r:5}} connectNulls={false} isAnimationActive={false} />
                                    {ufsToPlotCapilaridade.map((u, i) => <Line key={String(u)} type="monotone" dataKey={String(u)} name={String(u)} stroke={CHART_COLORS[i % CHART_COLORS.length]} strokeWidth={2} dot={{r:2, strokeWidth:1}} activeDot={{r:4}} connectNulls={false} isAnimationActive={false} />)}
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                    );
                }

                if (modalConfig.type === 'manual') {
                    const tabs = [
                        { id: 'conceitos', label: 'CONCEITOS' },
                        { id: 'kpis', label: 'MÉTRICAS (KPIS)' },
                        { id: 'graficos', label: 'VISÕES DO DASHBOARD' },
                        { id: 'estrategia', label: 'MATRIZ ESTRATÉGICA' }
                    ];
                    return (
                        <div className="p-4 lg:p-6 bg-white space-y-6 max-w-5xl mx-auto animate-fade-in">
                            <div className="flex border-b border-slate-200 mb-6 sticky top-0 bg-white z-10 overflow-x-auto custom-scroll">
                                {tabs.map(t => (
                                    <button key={t.id} onClick={() => setActiveManualTab(t.id)} className={`px-4 lg:px-6 py-3 text-[10px] font-black tracking-widest border-b-2 transition-all whitespace-nowrap ${activeManualTab === t.id ? 'border-blue-600 text-blue-700 bg-blue-50/50' : 'border-transparent text-slate-400 hover:text-slate-800 hover:bg-slate-50'}`}>
                                        {t.label}
                                    </button>
                                ))}
                            </div>
                            
                            {activeManualTab === 'conceitos' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-sm">
                                        <h4 className="text-xs font-black text-blue-800 mb-2 flex items-center gap-1.5"><Icon name="Clock" size={14}/>Visão YTD (Year-to-Date)</h4>
                                        <p className="text-[10px] text-slate-600 leading-relaxed">Analisa o desempenho acumulado desde o primeiro dia do ano atual até a data de hoje, comparando exatamente com o mesmo intervalo de tempo do ano anterior. Fundamental para avaliar a meta anual.</p>
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-sm">
                                        <h4 className="text-xs font-black text-indigo-800 mb-2 flex items-center gap-1.5"><Icon name="Clock" size={14}/>Visão UDM (Últimos 12 Meses)</h4>
                                        <p className="text-[10px] text-slate-600 leading-relaxed">Avalia uma janela móvel dos últimos 12 meses fechados. Ao remover a sazonalidade de meses atípicos, revela a verdadeira tendência de crescimento sustentável da carteira.</p>
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-sm">
                                        <h4 className="text-xs font-black text-fuchsia-800 mb-2 flex items-center gap-1.5"><Icon name="Clock" size={14}/>Visão U6M (Últimos 6 Meses)</h4>
                                        <p className="text-[10px] text-slate-600 leading-relaxed">Avalia a tração de curto prazo do negócio. Compara as vendas dos últimos 6 meses com o semestre imediatamente anterior, capturando tendências e choques recentes no mercado.</p>
                                    </div>
                                    <div className="bg-emerald-50 p-5 rounded-2xl border border-emerald-200 shadow-sm">
                                        <h4 className="text-xs font-black text-emerald-800 mb-2 flex items-center gap-1.5"><Icon name="Package" size={14}/>White Space (Oportunidades)</h4>
                                        <p className="text-[10px] text-emerald-700 leading-relaxed">É a identificação de "espaços em branco". Revela quais clientes ativos já têm relacionamento e faturamento consigo, mas que ainda não consomem produtos específicos do seu portefólio (Cross-sell).</p>
                                    </div>
                                </div>
                            )}

                            {activeManualTab === 'kpis' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="flex gap-4 items-start p-4 bg-white rounded-xl border border-slate-200 shadow-sm">
                                        <div className="w-10 h-10 bg-slate-100 text-slate-600 rounded-lg flex items-center justify-center shrink-0 shadow-inner"><Icon name="TrendingUp" size={20}/></div>
                                        <div><h5 className="text-[11px] font-black text-slate-800 uppercase">Faturamento</h5><p className="text-[9px] text-slate-500 mt-1">Receita total gerada no período. O crescimento compara o valor atual contra o período exato anterior.</p></div>
                                    </div>
                                    <div className="flex gap-4 items-start p-4 bg-white rounded-xl border border-slate-200 shadow-sm">
                                        <div className="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center shrink-0 shadow-inner"><Icon name="Users" size={20}/></div>
                                        <div><h5 className="text-[11px] font-black text-slate-800 uppercase">Capilaridade (PDVs)</h5><p className="text-[9px] text-slate-500 mt-1">Quantidade de CNPJs únicos que realizaram compras. Demonstra a saúde e amplitude de distribuição da rede.</p></div>
                                    </div>
                                    <div className="flex gap-4 items-start p-4 bg-white rounded-xl border border-slate-200 shadow-sm">
                                        <div className="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center shrink-0 shadow-inner"><Icon name="MapPin" size={20}/></div>
                                        <div><h5 className="text-[11px] font-black text-slate-800 uppercase">Ticket e Preço Médio</h5><p className="text-[9px] text-slate-500 mt-1"><b>Ticket Médio:</b> Gasto médio por CNPJ. <b>Preço Médio:</b> Valor médio cobrado por unidade de produto.</p></div>
                                    </div>
                                    <div className="flex gap-4 items-start p-4 bg-emerald-50 rounded-xl border border-emerald-200 shadow-sm">
                                        <div className="w-10 h-10 bg-emerald-500 text-white rounded-lg flex items-center justify-center shrink-0 shadow-md"><Icon name="UserPlus" size={20}/></div>
                                        <div><h5 className="text-[11px] font-black text-emerald-900 uppercase">Clientes Novos</h5><p className="text-[9px] text-emerald-700 mt-1">Clientes que compraram no período atual, mas que não tinham nenhum histórico de compra no período anterior.</p></div>
                                    </div>
                                    <div className="flex gap-4 items-start p-4 bg-rose-50 rounded-xl border border-rose-200 shadow-sm">
                                        <div className="w-10 h-10 bg-rose-500 text-white rounded-lg flex items-center justify-center shrink-0 shadow-md"><Icon name="UserMinus" size={20}/></div>
                                        <div><h5 className="text-[11px] font-black text-rose-900 uppercase">Clientes Perdidos (Churn)</h5><p className="text-[9px] text-rose-700 mt-1">Sinal vermelho. Clientes que registraram faturamento no período anterior, mas que estão com 0 compras no período atual.</p></div>
                                    </div>
                                    <div className="flex gap-4 items-start p-4 bg-amber-50 rounded-xl border border-amber-200 shadow-sm">
                                        <div className="w-10 h-10 bg-amber-500 text-white rounded-lg flex items-center justify-center shrink-0 shadow-md"><Icon name="AlertCircle" size={20}/></div>
                                        <div><h5 className="text-[11px] font-black text-amber-900 uppercase">Em Alerta</h5><p className="text-[9px] text-amber-700 mt-1">Clientes ainda ativos no período atual, mas que já não compram há mais de 2 meses. Risco iminente de Churn.</p></div>
                                    </div>
                                </div>
                            )}

                            {activeManualTab === 'graficos' && (
                                <div className="space-y-4">
                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <h4 className="text-[11px] font-black text-slate-800 uppercase mb-1 flex items-center gap-2"><Icon name="TrendingUp" className="text-blue-600"/> Evolução Mensal</h4>
                                        <p className="text-[10px] text-slate-600 mb-2">Exibe as curvas de faturamento e volume vendidas mês a mês. Permite sobrepor os anos para descobrir sazonalidades e ver a linha média global.</p>
                                    </div>
                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <h4 className="text-[11px] font-black text-slate-800 uppercase mb-1 flex items-center gap-2"><Icon name="MapPin" className="text-emerald-600"/> Representatividade (Treemap)</h4>
                                        <p className="text-[10px] text-slate-600 mb-2">Gráfico de blocos interativo. Facilita a visualização do peso de UFs, Cidades ou Tipos de Clientes. O botão "Raio-X" liberta a matriz de White Space para cruzamento de produtos contra regiões.</p>
                                    </div>
                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <h4 className="text-[11px] font-black text-slate-800 uppercase mb-1 flex items-center gap-2"><Icon name="Target" className="text-indigo-600"/> Curva ABC (Pareto)</h4>
                                        <p className="text-[10px] text-slate-600 mb-2">Classifica produtos ou clientes pela regra 80/20. Curva A (vital para o faturamento), Curva B (manutenção) e Curva C (baixo impacto, avalie o esforço).</p>
                                    </div>
                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <h4 className="text-[11px] font-black text-slate-800 uppercase mb-1 flex items-center gap-2"><Icon name="List" className="text-slate-600"/> Visão Analítica (Raw Data)</h4>
                                        <p className="text-[10px] text-slate-600 mb-2">Painel de auditoria. Exibe exatamente os dados processados linha a linha, com flexibilidade de exportação integral de faturas e quantidades para Excel.</p>
                                    </div>
                                </div>
                            )}

                            {activeManualTab === 'estrategia' && (
                                <div className="space-y-4">
                                    <p className="text-[10px] text-slate-600 mb-4 bg-slate-50 p-3 rounded-lg border border-slate-200">A <b>Matriz de Performance</b> distribui a sua base num gráfico onde o Eixo X é o % de Crescimento e o Eixo Y é o Faturamento (R$). O painel divide automaticamente o ecrã em 4 quadrantes cruzando as médias atuais.</p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-[10px]">
                                        <div className="p-5 border border-emerald-200 bg-emerald-50 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                                            <div className="flex items-center gap-2 mb-2"><div className="w-3 h-3 bg-emerald-500 rounded-sm"></div><h4 className="font-black text-emerald-800 text-[11px] uppercase">Estrelas</h4></div>
                                            <p className="text-emerald-700 leading-relaxed"><b>Alta Faturação + Alto Crescimento.</b> São os motores atuais do negócio. <br/><br/><b>Estratégia:</b> Assegurar o nível de serviço (SLA), garantir disponibilidade de estoque e proteger agressivamente de qualquer assédio da concorrência.</p>
                                        </div>
                                        <div className="p-5 border border-blue-200 bg-blue-50 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                                            <div className="flex items-center gap-2 mb-2"><div className="w-3 h-3 bg-blue-500 rounded-sm"></div><h4 className="font-black text-blue-800 text-[11px] uppercase">Vacas Leiteiras</h4></div>
                                            <p className="text-blue-700 leading-relaxed"><b>Alta Faturação + Baixo Crescimento (ou Queda).</b> São clientes massivos que pararam de crescer, muitas vezes porque já foram capitalizados pela concorrência em novas linhas.<br/><br/><b>Estratégia:</b> Focar no relacionamento e usar o "White Space" para lhes vender novos produtos.</p>
                                        </div>
                                        <div className="p-5 border border-amber-200 bg-amber-50 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                                            <div className="flex items-center gap-2 mb-2"><div className="w-3 h-3 bg-amber-500 rounded-sm"></div><h4 className="font-black text-amber-800 text-[11px] uppercase">Apostas</h4></div>
                                            <p className="text-amber-700 leading-relaxed"><b>Baixa Faturação + Alto Crescimento.</b> Pequenos clientes/produtos que estão a acelerar mais rápido do que a média de mercado.<br/><br/><b>Estratégia:</b> Treinar o comercial para impulsionar estes clientes. São os talentos do futuro e as futuras Estrelas do seu portfólio.</p>
                                        </div>
                                        <div className="p-5 border border-rose-200 bg-rose-50 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                                            <div className="flex items-center gap-2 mb-2"><div className="w-3 h-3 bg-rose-500 rounded-sm"></div><h4 className="font-black text-rose-800 text-[11px] uppercase">Abacaxis</h4></div>
                                            <p className="text-rose-700 leading-relaxed"><b>Baixa Faturação + Baixo Crescimento.</b> Consomem tempo operacional sem garantir retorno à empresa.<br/><br/><b>Estratégia:</b> Reduzir custo de visita física. Avaliar automação do atendimento (via portal ou telefone) ou mesmo o desinvestimento caso não tenham potencial regional.</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                }

                const isAlerta = modalConfig.type === 'alerta';
                const isPerdido = modalConfig.type === 'perdidos';
                const totalModalFatCur = filteredModalDataList.reduce((acc, curr) => acc + (curr.fatCur || 0), 0);
                const totalModalFatComp = filteredModalDataList.reduce((acc, curr) => acc + (curr.fatComp || 0), 0);

                const colsFB = [ 
                    {label:'Nome / CNPJ', val:r=><div><div className="font-bold text-slate-800 truncate max-w-[200px]">{String(r.name || 'N/I')}</div><div className="text-[8px] text-slate-400 mt-0.5">{formatCnpj(r.cnpj)}</div></div>}, 
                    {label:'UF', align:'text-center', val:r=><span className="bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded text-[8px] font-bold">{String(r.state || 'N/I')}</span>}, 
                    {label:'Cidade', val:r=><span className="text-[8px] text-slate-600 font-semibold">{String(r.city || 'N/I')}</span>}, 
                    ...(isAlerta ? [
                        {label:'Média Mensal', align:'text-right', val:r=><span className="font-bold text-slate-500">{formatCurrency(r.mediaMensal)}/mês</span>}, 
                        {label:'Status', align:'text-center', val:r=><span className="bg-amber-100 text-amber-700 px-2 py-0.5 rounded text-[8px] font-black">{String(r.atraso)} meses atraso</span>}
                    ] : [
                        {label:'Fat. Atual', align:'text-right', val:r=><span className={`font-bold ${isPerdido ? 'text-rose-500' : 'text-emerald-600'}`}>{formatCurrency(r.fatCur)}</span>}, 
                        {label:'Fat. Ant.', align:'text-right', val:r=><span className="text-slate-400 font-bold">{formatCurrency(r.fatComp)}</span>}
                    ]) 
                ];
                
                return (
                    <div className="p-3 lg:p-4">
                        <DataTable cols={colsFB} data={filteredModalDataList.slice(0, 100)} footer={
                            <tr className="text-[9px] font-black text-slate-800 uppercase border-t border-slate-200">
                                <td colSpan={4} className="py-3 px-4 text-right">{isAlerta ? 'Fat. em Risco:' : 'Total Selecionado:'}</td>
                                <td colSpan={isAlerta ? 2 : 1} className={`py-3 px-4 text-right text-xs font-bold ${isPerdido ? 'text-rose-500' : 'text-emerald-600'}`}>{formatCurrency(totalModalFatCur)}</td>
                                {!isAlerta && <td className="py-3 px-4 text-right text-xs font-bold text-slate-500">{formatCurrency(totalModalFatComp)}</td>}
                            </tr>
                        } />
                    </div>
                );
            };

            if (isLoadingAuto) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-4 animate-fade-in">
                        <Icon name="Loader2" size={48} className="text-blue-600 mb-6" />
                        <h2 className="text-xl md:text-2xl font-black text-slate-800 mb-2">A processar matriz de dados...</h2>
                        <p className="text-xs md:text-sm text-slate-500 font-semibold text-center max-w-md">Isto pode demorar alguns segundos dependendo do tamanho da base.</p>
                    </div>
                );
            }

            if (!isLoaded || showUploadScreen) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                    <div className="bg-white p-6 rounded-2xl shadow-xl text-center max-w-sm w-full border border-slate-100">
                        {errorMsg && (
                            <div className="mb-4 flex items-start gap-2 text-left bg-rose-50 p-3 rounded-lg text-rose-700 font-bold text-[10px]">
                                <Icon name="AlertCircle" size={16} className="shrink-0" />
                                {errorMsg}
                            </div>
                        )}
                        
                        {!isAdminVerified ? (
                            <>
                                <div className="w-12 h-12 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-inner">
                                    <Icon name="Users" size={24} />
                                </div>
                                <h2 className="text-lg font-black text-slate-800 mb-1">Acesso Restrito</h2>
                                <p className="text-[10px] text-slate-500 mb-4 font-semibold">Introduza a sua credencial para continuar</p>
                                
                                <input 
                                    type="password" 
                                    placeholder="Sua credencial..." 
                                    value={passwordValue} 
                                    onChange={e => setPasswordValue(e.target.value)} 
                                    onKeyDown={e => e.key === 'Enter' && verifyPassword()} 
                                    className={`w-full px-3 py-2.5 rounded-lg border text-center font-bold text-xs mb-2 bg-slate-50 focus:ring-2 outline-none transition-all ${passwordError ? 'border-rose-500 focus:ring-rose-200' : 'border-slate-200 focus:ring-blue-500'}`} 
                                />
                                {passwordError && <p className="text-[9px] font-bold text-rose-500 mb-2">Credencial inválida. Tente novamente.</p>}
                                
                                <button onClick={verifyPassword} className="w-full bg-blue-600 text-white font-black text-xs py-2.5 rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
                                    Entrar no Dashboard
                                </button>
                            </>
                        ) : (
                            <>
                                <div className="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-inner">
                                    <Icon name="Upload" size={24} />
                                </div>
                                <h2 className="text-lg font-black text-slate-800 mb-1">Olá, {String(currentUser?.nome?.split(' ')[0] || '')}!</h2>
                                <p className="text-[10px] text-slate-500 mb-4 font-semibold">Por favor, carregue a base de dados (.csv) para gerar as visões.</p>
                                
                                <label className="block w-full cursor-pointer bg-slate-900 text-white font-black text-xs py-3 rounded-lg hover:bg-black transition-colors shadow-sm">
                                    Selecionar Base de Dados (CSV)
                                    <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                                </label>
                            </>
                        )}
                    </div>
                </div>
            );

            return (
                <div id="main-dashboard-export-area" className={`max-w-[1600px] mx-auto p-2 lg:p-3 text-slate-900 flex flex-col gap-1.5 ${modalConfig.isOpen ? 'has-modal' : ''} ${isPdfMode ? 'pdf-mode' : ''}`}>
                    {isPdfMode && (
                        <div className="fixed inset-0 z-[99999] bg-slate-900/80 flex flex-col items-center justify-center text-white no-export" style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0 }}>
                            <Icon name="Loader2" size={64} className="animate-spin text-blue-500 mb-6" />
                            <h2 className="text-3xl font-black mb-2">A Exportar PDF...</h2>
                            <p className="text-sm font-semibold text-slate-300">O ecrã vai congelar por uns segundos. É normal, aguarde.</p>
                        </div>
                    )}
                    <div className={modalConfig.isOpen ? 'print:hidden main-dashboard-content' : 'main-dashboard-content'}>
                        {/* Cabeçalho Principal do Dashboard */}
                        <div className="bg-white p-2 lg:p-3 rounded-xl border border-slate-200 shadow-md flex flex-col md:flex-row justify-between items-start md:items-center gap-2 mb-1.5">
                            <div className="flex items-center gap-3">
                                <div className="relative w-10 h-10 shrink-0">
                                    <img 
                                        src="youyou.webp" 
                                        alt="Mascote YouYou" 
                                        className="absolute inset-0 w-10 h-10 object-contain drop-shadow-md bg-white rounded-full border border-slate-200 p-0.5 z-10" 
                                        onError={(e) => { 
                                            e.target.onerror = null; 
                                            e.target.style.display = 'none'; 
                                        }} 
                                    />
                                    <div className="absolute inset-0 w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center border border-indigo-200 shadow-inner z-0">
                                        <Icon name="TrendingUp" size={18} className="text-indigo-600"/>
                                    </div>
                                </div>
                                <div>
                                    <div className="flex items-center gap-1.5 mb-0.5">
                                        <div className="w-1 h-4 bg-blue-600 rounded-full shadow-sm"></div>
                                        <h1 className="text-base font-black tracking-tight text-slate-800 uppercase leading-none whitespace-nowrap">Performance Comercial</h1>
                                    </div>
                                    <p className="text-slate-400 text-[8px] font-bold uppercase tracking-widest ml-2.5">Dashboard Sellout {currentUser && <span className="text-blue-500 font-black normal-case tracking-normal ml-1">&bull; {String(currentUser.nome.split(' ')[0])}</span>}</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-1 bg-slate-100 p-1 rounded-lg border border-slate-200 shadow-inner no-export">
                                <button onClick={()=>setTimeMode('U6M')} className={`px-2.5 py-1 text-[8px] uppercase tracking-wider font-black rounded-md transition-all shadow-sm ${timeMode==='U6M'?'bg-white text-blue-700':'text-slate-500 hover:text-slate-700'}`}>U6M</button>
                                <button onClick={()=>setTimeMode('UDM')} className={`px-2.5 py-1 text-[8px] uppercase tracking-wider font-black rounded-md transition-all shadow-sm ${timeMode==='UDM'?'bg-white text-blue-700':'text-slate-500 hover:text-slate-700'}`}>UDM</button>
                                <button onClick={()=>setTimeMode('YTD')} className={`px-2.5 py-1 text-[8px] uppercase tracking-wider font-black rounded-md transition-all shadow-sm ${timeMode==='YTD'?'bg-white text-blue-700':'text-slate-500 hover:text-slate-700'}`}>YTD</button>
                            </div>
                            <div className="flex items-center gap-1.5 flex-wrap no-export">
                                {lastUpdate && <div className="text-[9px] font-bold text-slate-500 bg-slate-50 border border-slate-200 shadow-sm px-2 py-1 rounded-lg flex items-center gap-1"><Icon name="Clock" size={10} className="text-slate-400" /> Atualizado: <span className="text-slate-700">{String(lastUpdate)}</span></div>}
                                <button onClick={()=>openModal('manual')} className="flex items-center gap-1 bg-blue-50 text-blue-700 border border-blue-200 px-2.5 py-1 rounded-lg text-[9px] font-bold hover:bg-blue-100 shadow-sm" title="Manual de Uso"><Icon name="BookOpen" size={10}/> Manual</button>
                                <button onClick={exportToPDF} className="flex items-center gap-1 bg-rose-50 text-rose-700 border border-rose-200 px-2.5 py-1 rounded-lg text-[9px] font-bold hover:bg-rose-100 shadow-sm" title="Salvar Tela em PDF"><Icon name="Download" size={10}/> PDF</button>
                                <button onClick={handleExportMainExcel} className="flex items-center gap-1 bg-emerald-50 text-emerald-700 border border-emerald-200 px-2.5 py-1 rounded-lg text-[9px] font-bold hover:bg-emerald-100 shadow-sm" title="Exportar Tabela Global"><Icon name="FileSpreadsheet" size={10}/> Excel</button>
                                <button onClick={()=>openModal('abc')} className="flex items-center gap-1 bg-indigo-50 text-indigo-700 border border-indigo-200 px-2.5 py-1 rounded-lg text-[9px] font-bold hover:bg-indigo-100 shadow-sm" title="Ver Curva ABC"><Icon name="Target" size={10}/> Curva ABC</button>
                                <button onClick={()=>openModal('analitico')} className="flex items-center gap-1 bg-white text-slate-700 border border-slate-200 px-2.5 py-1 rounded-lg text-[9px] font-bold hover:bg-slate-50 shadow-sm" title="Visão Analítica (Raw Data)"><Icon name="List" size={10}/> Analítico</button>
                                <button onClick={()=>{setShowUploadScreen(true);setIsLoaded(false);}} className="flex items-center gap-1 bg-slate-900 text-white px-2.5 py-1 rounded-lg text-[9px] font-bold hover:bg-black shadow-sm" title="Carregar Nova Base CSV"><Icon name="Upload" size={10}/> CSV</button>
                                <button onClick={()=>{setShowUploadScreen(true);setIsLoaded(false);setCurrentUser(null);setPasswordValue('');setIsAdminVerified(false);}} className="flex items-center gap-1 bg-slate-100 text-slate-500 border border-slate-200 px-2.5 py-1 rounded-lg text-[9px] font-bold hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 shadow-sm" title="Sair do Sistema"><Icon name="UserMinus" size={10}/> Sair</button>
                            </div>
                        </div>

                        {/* Filtros Ativos para Impressão PDF */}
                        {isPdfMode && !modalConfig.isOpen && (
                            <div className="bg-blue-50/50 p-2.5 rounded-xl border border-blue-100 shadow-sm flex items-start gap-2 mb-1.5 animate-fade-in">
                                <div className="p-1.5 bg-blue-100 rounded-lg text-blue-600 shrink-0"><Icon name="Filter" size={14} /></div>
                                <div className="flex flex-col">
                                    <span className="text-[8px] font-black text-blue-800 uppercase tracking-widest">Filtros Aplicados no PDF:</span>
                                    <span className="text-[10px] font-bold text-blue-900 mt-0.5 leading-snug">{activeFiltersSummary}</span>
                                </div>
                            </div>
                        )}

                        {/* Filtros */}
                        <div className="bg-white p-2.5 rounded-xl border border-slate-200 shadow-md flex flex-wrap gap-2 items-end mb-1.5 no-export">
                            <div className="flex-[1.5] min-w-[120px]"><DebouncedInput value={filters.searchCustomer} onChange={v => setFilters({...filters, searchCustomer: v})} placeholder="Nome/CNPJ..." icon="Search" /></div>
                            <div className="flex-[1.5] min-w-[120px]"><DebouncedInput value={filters.searchProduct} onChange={v => setFilters({...filters, searchProduct: v})} placeholder="Produto..." icon="Package" /></div>
                            <CustomMultiSelect label="Anos" options={availableOptions.years} selected={filters.years} onChange={v => setFilters({...filters, years: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Meses" options={availableOptions.months} selected={filters.months} onChange={v => setFilters({...filters, months: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Estado" options={availableOptions.states} selected={filters.state} onChange={v => setFilters({...filters, state: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Cidade" options={availableOptions.cities} selected={filters.city} onChange={v => setFilters({...filters, city: v})} placeholder="Todas" searchable={true} />
                            <CustomMultiSelect label="Distribuidor" options={availableOptions.distributors} selected={filters.distributor} onChange={v => setFilters({...filters, distributor: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Tipo Cliente" options={availableOptions.customerTypes} selected={filters.customerType} onChange={v => setFilters({...filters, customerType: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Unidade" options={availableOptions.types} selected={filters.type} onChange={v => setFilters({...filters, type: v})} placeholder="Todas" searchable={true} />
                            
                            <div className="flex flex-col justify-end pb-0.5">
                                <button onClick={() => initialFilters && setFilters(initialFilters)} className="px-3 h-[24px] bg-slate-100 hover:bg-rose-50 hover:text-rose-600 text-slate-500 text-[8px] font-bold rounded border border-slate-200 transition-colors flex items-center gap-1 shadow-sm" title="Limpar todos os filtros">
                                    <Icon name="X" size={10} /> Limpar
                                </button>
                            </div>
                        </div>

                        {/* KPIs */}
                        <div className="grid grid-cols-3 xl:grid-cols-6 gap-2 mb-1.5">
                            <KPICard title="Faturamento" metricKey="fatCur" growthKey="fatGrowth" icon="TrendingUp" color="slate" met={globalMetrics} yearComp={yearComparisonData} timeMode={timeMode} isCurrency={true} />
                            <KPICard title={priceKpiMode === 'preco' ? 'Preço Médio' : 'Ticket Médio'} metricKey={priceKpiMode === 'preco' ? 'precoMedioCur' : 'ticketMedioCur'} growthKey={priceKpiMode === 'preco' ? 'precoMedioGrowth' : 'ticketMedioGrowth'} icon={priceKpiMode === 'preco' ? "Package" : "MapPin"} color="blue" onClick={priceKpiMode === 'preco' ? () => openModal('preco') : null} toggle={() => setPriceKpiMode(p => p === 'preco' ? 'ticket' : 'preco')} met={globalMetrics} yearComp={yearComparisonData} timeMode={timeMode} isCurrency={true} />
                            <KPICard title="Capilaridade" metricKey="capCur" growthKey="capGrowth" icon="Users" color="indigo" onClick={() => openModal('capilaridade')} met={globalMetrics} yearComp={yearComparisonData} timeMode={timeMode} isNumber={true} />
                            <KPICard title="Clientes Novos" metricKey="novosMain" growthKey="fatNovosMain" icon="UserPlus" color="emerald" onClick={() => openModal('novos')} met={globalMetrics} yearComp={yearComparisonData} timeMode={timeMode} isNumber={true} />
                            <KPICard title="Em Alerta" metricKey="alertaMain" icon="Bell" color="amber" onClick={() => openModal('alerta')} met={globalMetrics} yearComp={yearComparisonData} timeMode={timeMode} isNumber={true} />
                            <KPICard title="Clientes Perdidos" metricKey="perdidosMain" growthKey="fatPerdidosMain" icon="UserMinus" color="rose" onClick={() => openModal('perdidos')} met={globalMetrics} yearComp={yearComparisonData} timeMode={timeMode} isNumber={true} />
                        </div>

                        {/* Gráficos Estratégicos Centrais Lado a Lado */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-2 mb-1.5">
                            <div className="lg:col-span-2 bg-white p-3 rounded-xl border border-slate-200 shadow-md">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 flex items-center gap-1.5"><Icon name="TrendingUp" size={12} className="text-blue-600" /> Evolução Mensal</h3>
                                    <div className="flex bg-slate-100 p-0.5 rounded-lg shadow-sm border border-slate-200 no-export">
                                        <button onClick={() => setEvolucaoMode('faturamento')} className={`px-2.5 py-1 text-[9px] font-bold rounded-md transition-colors ${evolucaoMode === 'faturamento' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>R$ Faturamento</button>
                                        <button onClick={() => setEvolucaoMode('quantidade')} className={`px-2.5 py-1 text-[9px] font-bold rounded-md transition-colors ${evolucaoMode === 'quantidade' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>Unidades</button>
                                    </div>
                                </div>
                                <div className="h-[220px] w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={evolutionChartData.data} margin={{ top: 10, right: 10, left: -25, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 9, fontWeight: 600, fill: '#94a3b8'}} />
                                            <YAxis axisLine={false} tickLine={false} tick={{fontSize: 9, fontWeight: 600, fill: '#94a3b8'}} tickFormatter={v => evolucaoMode === 'faturamento' ? `${(Number(v)/1000000).toFixed(1)}M` : (v>=1000 ? (v/1000).toFixed(1)+'k' : v)} />
                                            <Tooltip formatter={(v, name) => [evolucaoMode === 'faturamento' ? formatCurrency(v) : (Number(v || 0).toLocaleString('pt-BR') + " un"), "Ano " + String(name)]} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 8px 20px rgba(0,0,0,0.1)'}} />
                                            <Legend verticalAlign="top" height={20} iconType="circle" wrapperStyle={{ fontSize: '10px', fontWeight: 'bold', color: '#64748b' }} />
                                            {evolutionChartMedia !== null && <ReferenceLine y={evolutionChartMedia} stroke="#94a3b8" strokeDasharray="4 4" label={{ position: 'top', value: `Média: ${evolucaoMode === 'faturamento' ? formatCurrency(evolutionChartMedia) : (evolutionChartMedia>=1000 ? (evolutionChartMedia/1000).toFixed(1)+'k' : Number(evolutionChartMedia).toFixed(0))}`, fill: '#64748b', fontSize: 8, fontWeight: 'bold' }} />}
                                            {evolutionChartData.lines.map((y, i) => {
                                                const isNewest = y === Math.max(...evolutionChartData.lines);
                                                const color = evolutionChartData.lines.length === 2 ? (isNewest ? '#3b82f6' : '#cbd5e1') : CHART_COLORS[i % CHART_COLORS.length];
                                                return <Line key={String(y)} type="monotone" dataKey={y} name={String(y)} stroke={color} strokeWidth={2.5} dot={{r: 2.5, strokeWidth: 1.5}} activeDot={{r: 4}} isAnimationActive={false} connectNulls={false} />
                                            })}
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                            <div className="bg-white p-3 rounded-xl border border-slate-200 shadow-md flex flex-col group">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 flex items-center gap-1.5"><Icon name="MapPin" size={12} className="text-blue-600" /> Repres. ({timeMode})</h3>
                                    <div className="flex items-center gap-1.5 no-export">
                                        <div className="flex flex-wrap gap-0.5 bg-slate-100 p-0.5 rounded-md shadow-sm border border-slate-200">
                                            {['UF', 'Distribuidor', 'Tipo Cliente', 'Unidade'].map(m => (
                                                <button key={m} onClick={() => setPieChartMetric(m)} className={`px-1.5 py-0.5 text-[7px] font-bold rounded transition-all ${pieChartMetric === m ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:bg-slate-50'}`}>
                                                    {m}
                                                </button>
                                            ))}
                                        </div>
                                        <button onClick={() => openModal('representatividade')} className="text-[8px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md hover:bg-blue-100 shadow-sm border border-blue-200 flex items-center gap-1" title="Ver Oportunidades (White Space)">
                                            <Icon name="Target" size={10} /> 
                                        </button>
                                    </div>
                                </div>
                                <div className="h-[220px] w-full flex-1 relative">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <Treemap data={pieChartDataMain} dataKey="value" stroke="#fff" isAnimationActive={false} content={(props) => <CustomTreemapContentRecharts {...props} />}>
                                            <Tooltip content={(props) => <CustomUFTooltip {...props} />} />
                                        </Treemap>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-2 mb-1.5">
                            <RankWidget title="Top Produtos" icon="Package" colorClass="text-blue-600" fillHex="#3b82f6" data={topProductsGlobal} isFat={false} onOpenModal={() => openModal('produtos')} timeMode={timeMode} yearComparison={yearComparisonData} />
                            <RankWidget title="Top Distribuidores" icon="Truck" colorClass="text-emerald-500" fillHex="#10b981" data={topDistribuidoresGlobal} isFat={true} onOpenModal={() => openModal('distribuidores')} timeMode={timeMode} yearComparison={yearComparisonData} />
                            <RankWidget title="Top Clientes" icon="Users" colorClass="text-fuchsia-500" fillHex="#f59e0b" data={topClientsGlobal} isFat={true} onOpenModal={() => openModal('top')} timeMode={timeMode} yearComparison={yearComparisonData} />
                        </div>
                        
                        <div className="bg-white p-3 rounded-xl border border-slate-200 shadow-md mb-1.5">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 flex items-center gap-1.5 cursor-help border-b border-dashed border-slate-400 w-fit pb-[1px]" title="Eixo X = Crescimento (%) | Eixo Y = Faturamento (R$).">
                                    <Icon name="Target" size={12} className="text-blue-600" /> Matriz de Performance
                                </h3>
                                <div className="flex items-center gap-1.5 no-export">
                                    <div className="flex bg-slate-100 p-0.5 rounded-md shadow-sm border border-slate-200">
                                        <button onClick={() => setScatterMetric('clientes')} className={`px-2 py-0.5 text-[8px] font-bold rounded transition-colors ${scatterMetric === 'clientes' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:bg-slate-50'}`}>Clientes</button>
                                        <button onClick={() => setScatterMetric('produtos')} className={`px-2 py-0.5 text-[8px] font-bold rounded transition-colors ${scatterMetric === 'produtos' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:bg-slate-50'}`}>Produtos</button>
                                        <button onClick={() => setScatterMetric('distribuidores')} className={`px-2 py-0.5 text-[8px] font-bold rounded transition-colors ${scatterMetric === 'distribuidores' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:bg-slate-50'}`}>Distrib.</button>
                                    </div>
                                    <button onClick={() => setMatrixShowInactive(!matrixShowInactive)} className={`text-[8px] font-bold px-2 py-1 rounded-md shadow-sm border transition-colors flex items-center gap-1 ${matrixShowInactive ? 'bg-rose-50 text-rose-700 border-rose-200 hover:bg-rose-100' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`} title="Mostrar ou ocultar itens que pararam de comprar (Churn)">
                                        <Icon name={matrixShowInactive ? "UserMinus" : "Users"} size={10} /> {matrixShowInactive ? 'Ocultar Inativos' : '+ Inativos'}
                                    </button>
                                    <button onClick={() => openModal('matriz')} className="text-[8px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md hover:bg-blue-100 shadow-sm border border-blue-200 flex items-center gap-1">
                                        <Icon name="List" size={10} /> Raio-X
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3 mb-2 justify-center flex-wrap no-export">
                                <div className="flex items-center gap-1 text-[8px] font-bold text-emerald-600 cursor-help" title="Alta Receita e Alto Crescimento. Os motores do negócio."><div className="w-2 h-2 rounded-sm bg-emerald-500"></div> Estrelas</div>
                                <div className="flex items-center gap-1 text-[8px] font-bold text-blue-600 cursor-help" title="Alta Receita, mas Baixo Crescimento (ou queda). Exigem proteção e atenção."><div className="w-2 h-2 rounded-sm bg-blue-500"></div> Vacas Leiteiras</div>
                                <div className="flex items-center gap-1 text-[8px] font-bold text-amber-600 cursor-help" title="Baixa Receita, mas Alto Crescimento. Os talentos do futuro."><div className="w-2 h-2 rounded-sm bg-amber-500"></div> Apostas</div>
                                <div className="flex items-center gap-1 text-[8px] font-bold text-rose-600 cursor-help" title="Baixa Receita e Baixo Crescimento. Avaliar esforço de manutenção."><div className="w-2 h-2 rounded-sm bg-rose-500"></div> Abacaxis</div>
                            </div>

                            <div className="h-[220px] w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <ScatterChart margin={{ top: 5, right: 20, bottom: 0, left: -10 }}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                        <XAxis type="number" dataKey="growth" name="Crescimento" unit="%" tick={{fontSize: 8, fontWeight: 600, fill: '#94a3b8'}} tickFormatter={v => `${v}%`} axisLine={false} tickLine={false} />
                                        <YAxis type="number" dataKey="fatCur" name="Faturamento" tick={{fontSize: 8, fontWeight: 600, fill: '#94a3b8'}} tickFormatter={v => `${(v/1000000).toFixed(1)}M`} axisLine={false} tickLine={false} width={35} />
                                        <ZAxis type="number" dataKey="fatCur" range={[30, 180]} />
                                        <Tooltip cursor={{strokeDasharray: '3 3'}} content={(props) => <CustomScatterTooltip {...props} />} />
                                        <ReferenceLine y={scatterPlotData.avgFat} stroke="#cbd5e1" strokeDasharray="4 4" label={{ position: 'insideTopLeft', value: 'Média Fat.', fill: '#94a3b8', fontSize: 7, fontWeight: 'bold' }} />
                                        <ReferenceLine x={scatterPlotData.thresholdG} stroke="#cbd5e1" strokeDasharray="4 4" label={{ position: 'insideBottomRight', value: scatterPlotData.avgGrowth < 0 ? 'Mín (0%)' : 'Média Cresc.', fill: '#94a3b8', fontSize: 7, fontWeight: 'bold' }} />
                                        <Scatter name="Performance" data={scatterPlotData.filtered} fillOpacity={0.8} isAnimationActive={false}>
                                            {scatterPlotData.filtered.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.fillHex} />)}
                                        </Scatter>
                                    </ScatterChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        <div className="text-center mt-1 pb-4 border-t border-slate-200 pt-4 no-export">
                            <p className="text-[9px] text-slate-400 font-semibold tracking-wider">
                                DESENVOLVIDO POR: <a href="mailto:george.gos@gmail.com" className="text-blue-500 hover:text-blue-700 font-black hover:underline transition-colors ml-1">GEORGE SILVA</a>
                            </p>
                        </div>
                    </div>

                    {/* Modais Analíticos em Tela Cheia */}
                    {modalConfig.isOpen && (
                        <div className={`fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-2 sm:p-4 md:p-6 modal-overlay-bg`}>
                            <div id="modal-export-area" className={`bg-white rounded-2xl md:rounded-3xl w-full max-w-6xl max-h-[94vh] flex flex-col shadow-2xl overflow-hidden animate-fade-in relative print-modal-wrapper`}>
                                <div className="p-4 lg:p-5 border-b border-slate-100 flex flex-col bg-slate-50 gap-3 shrink-0 md:rounded-t-3xl">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center w-full gap-4">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center shadow-inner ${['novos','distribuidores'].includes(modalConfig.type)?'text-emerald-600 bg-emerald-100':['perdidos'].includes(modalConfig.type)?'text-rose-600 bg-rose-100':['top'].includes(modalConfig.type)?'text-fuchsia-600 bg-fuchsia-100':['alerta'].includes(modalConfig.type)?'text-amber-600 bg-amber-100':['preco','produtos','matriz','representatividade'].includes(modalConfig.type)?'text-blue-600 bg-blue-100':['abc'].includes(modalConfig.type)?'text-indigo-600 bg-indigo-100':'text-slate-600 bg-slate-100'}`}>
                                                <Icon name={IconName} size={20}/>
                                            </div>
                                            <div>
                                                <h2 className="text-lg font-black text-slate-800 uppercase tracking-tighter">{modalTitle}</h2>
                                                <p className="text-[10px] font-bold text-slate-500">{modalDesc}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2 no-export flex-wrap">
                                            {['distribuidores','produtos','top','abc'].includes(modalConfig.type) ? (
                                                <div className="min-w-[200px]">
                                                    <CustomSelect label={ modalConfig.type==='distribuidores'?'Distribuidor':modalConfig.type==='produtos'?'Produto':modalConfig.type==='abc'?(abcDimension==='clientes'?'Cliente':'Produto'):'Cliente' } options={ modalConfig.type==='distribuidores'?availableModalDistribuidores:modalConfig.type==='produtos'?availableModalProdutos:modalConfig.type==='abc'?abcOptions:availableModalClientes } selected={ modalConfig.type==='distribuidores'?modalDistributorFilter:modalConfig.type==='produtos'?modalProductFilter:modalConfig.type==='abc'?modalAbcFilter:modalClientFilter } onChange={v=>{ if(modalConfig.type==='distribuidores')setModalDistributorFilter(v); else if(modalConfig.type==='produtos')setModalProductFilter(v); else if(modalConfig.type==='top')setModalClientFilter(v); else if(modalConfig.type==='abc')setModalAbcFilter(v); }} placeholder="Pesquisar..." searchable={true} />
                                                </div>
                                            ) : modalConfig.type === 'representatividade' ? (
                                                <div className="min-w-[200px]">
                                                    <CustomSelect label={`Selecionar ${pieChartMetric}`} options={representatividadeDetails?.options || []} selected={modalRepFilter} onChange={(v)=>{setModalRepFilter(v); setSelectedOpportunity(null);}} placeholder="Pesquisar..." searchable={true} />
                                                </div>
                                            ) : null}
                                            
                                            {getModalBadge() && <div className="px-3 py-1.5 bg-slate-200 text-slate-700 rounded-lg text-[10px] font-bold">{String(getModalBadge())}</div>}

                                            <button onClick={exportToPDF} className="px-4 py-2 bg-rose-50 text-rose-700 rounded-xl text-[10px] font-black border border-rose-100 flex items-center gap-1.5 hover:bg-rose-100 shadow-sm"><Icon name="Download" size={12}/> PDF</button>
                                            
                                            {modalConfig.type !== 'manual' && (
                                                <button onClick={handleExportModalExcelData} className="px-4 py-2 bg-emerald-50 text-emerald-700 rounded-xl text-[10px] font-black border border-emerald-100 flex items-center gap-1.5 hover:bg-emerald-100 shadow-sm"><Icon name="FileSpreadsheet" size={12}/> Excel</button>
                                            )}

                                            <button onClick={()=>setModalConfig({isOpen:false, type:null})} className="w-9 h-9 bg-white border border-slate-200 rounded-xl flex items-center justify-center hover:text-rose-500 transition-all shadow-sm"><Icon name="X" size={16}/></button>
                                        </div>
                                    </div>
                                    
                                    {modalConfig.type !== 'manual' && (
                                        <div className={`flex flex-col gap-2 p-3 rounded-xl border ${isPdfMode ? 'bg-blue-50 border-blue-200' : 'bg-white border-slate-200 shadow-sm'} w-full`}>
                                            <div className="flex items-start gap-1.5 text-[9px] w-full">
                                                <span className={`font-black uppercase tracking-widest flex items-center gap-1 shrink-0 ${isPdfMode ? 'text-blue-800' : 'text-slate-500'}`}><Icon name="Filter" size={10} /> Filtros Globais Ativos:</span>
                                                <span className={`font-bold leading-tight ${isPdfMode ? 'text-blue-900' : 'text-slate-700'}`}>{activeFiltersSummary}</span>
                                            </div>
                                            
                                            {isPdfMode && (localModalSearch || modalUfFilter.length > 0 || modalYearFilter !== 'Todos') && (
                                                <div className="flex items-start gap-1.5 text-[9px] w-full mt-1 pt-2 border-t border-blue-200/50">
                                                    <span className="font-black text-indigo-800 uppercase tracking-widest flex items-center gap-1 shrink-0"><Icon name="Filter" size={10} /> Filtros Locais na Vista:</span>
                                                    <span className="font-bold text-indigo-900 leading-tight">
                                                        {[
                                                            localModalSearch && `Busca: "${localModalSearch}"`,
                                                            modalUfFilter.length > 0 && `UF: ${modalUfFilter.join(', ')}`,
                                                            modalYearFilter !== 'Todos' && `Ano: ${modalYearFilter}`
                                                        ].filter(Boolean).join('  •  ')}
                                                    </span>
                                                </div>
                                            )}

                                            <div className="flex flex-wrap gap-3 items-end mt-1 no-export">
                                                {['capilaridade','preco','analitico'].includes(modalConfig.type) && (
                                                    <div className="flex flex-col gap-0.5 min-w-[100px]">
                                                        <label className="text-[8px] font-black text-slate-500 uppercase tracking-wider">Ano Local</label>
                                                        <div className="relative">
                                                            <select value={modalYearFilter} onChange={e=>setModalYearFilter(e.target.value)} className="w-full bg-white border border-slate-200 rounded-lg px-2 py-1 text-[10px] font-bold text-slate-700 shadow-sm appearance-none h-[28px]">
                                                                <option value="Todos">Todos</option>
                                                                {allAvailableYears.map(y=><option key={String(y)} value={String(y)}>{y}</option>)}
                                                            </select>
                                                            <Icon name="ChevronDown" size={10} className="absolute right-2 top-2 text-slate-400 pointer-events-none"/>
                                                        </div>
                                                    </div>
                                                )}
                                                {['capilaridade','preco','analitico','distribuidores','produtos','top','representatividade'].includes(modalConfig.type) && (
                                                    <div className="flex flex-1 max-w-lg gap-3">
                                                        <div className="flex-1 max-w-xs">
                                                            <label className="text-[8px] font-black text-slate-500 uppercase tracking-wider">Busca Local</label>
                                                            <DebouncedInput value={localModalSearch} onChange={setLocalModalSearch} placeholder="Filtrar nesta janela..." icon="Search"/>
                                                        </div>
                                                        <CustomMultiSelect label="Filtrar UF (Local)" options={availableOptions.states} selected={modalUfFilter} onChange={setModalUfFilter} placeholder="Todas UFs" searchable={true} />
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="p-0 overflow-y-auto modal-scroll flex-1 bg-slate-50/50 print-modal-bg print:bg-white">
                                    {renderModalBody()}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardApp />);
    </script>
</body>
</html>
